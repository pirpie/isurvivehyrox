    // Baseline = 30-34 (factor 1.00). Older groups are generally slower (higher factor).

      '16-24': 0.92, '25-29': 0.92, '30-34': 1.00,
      '35-39': 1.00, '40-44': 1.02, '45-49': 1.02,

    // ─── Utilities ────────────────────────────────────────────────────────────────

    function parseTime(input) {
      const s = String(input).trim();
      // Support both "6:59" and "6.59" as 6 min 59 sec
      const sep = s.includes(':') ? ':' : s.includes('.') ? '.' : null;
      if (sep) {
        const [m, sec] = s.split(sep);
        const mins = parseInt(m, 10), secs = parseInt(sec, 10);
        if (!isNaN(mins) && !isNaN(secs) && secs < 60) return mins * 60 + secs;
        return NaN;
      }
      const n = parseInt(s, 10);
      return isNaN(n) ? NaN : n;
    }

    function formatTime(secs) {
      if (secs == null || isNaN(secs)) return '--:--';
      const t = Math.round(Math.abs(secs));
      return `${String(Math.floor(t / 60)).padStart(2, '0')}:${String(t % 60).padStart(2, '0')}`;
    }

    function formatDuration(secs) {
      if (secs == null || isNaN(secs)) return '--:--:--';
      const t = Math.round(Math.abs(secs));
      const h = Math.floor(t / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function getDaysUntil(dateStr) {
      if (!dateStr) return null;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      return Math.round((new Date(dateStr + 'T00:00:00') - today) / 86400000);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      try { return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
      catch { return dateStr; }
    }

    function loadLS(key, fallback) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }

    function today() { return new Date().toISOString().split('T')[0]; }

    function getAgeGroup(age) {
      const a = parseInt(age, 10);
      if (isNaN(a)) return null;
      if (a < 25) return '16-24'; if (a < 30) return '25-29'; if (a < 35) return '30-34';
      if (a < 40) return '35-39'; if (a < 45) return '40-44'; if (a < 50) return '45-49';
      if (a < 55) return '50-54'; if (a < 60) return '55-59'; return '60+';
    }

    function getBenchmark(gender, age, stationId) {
      if (!gender || !age) return null;
      const base = BASE_BENCHMARKS[gender]?.[stationId];
      if (!base) return null;
      const ageGroup = getAgeGroup(age);
      const f = AGE_FACTORS[ageGroup] || 1.0;
      return {
        elite:        Math.round(base.elite * f),
        advanced:     Math.round(base.advanced * f),
        intermediate: Math.round(base.intermediate * f),
        beginner:     Math.round(base.beginner * f),
        ageGroup,
      };
    }

    function getTier(userTime, bm) {
      if (!bm || userTime == null) return null;
      if (userTime <= bm.elite)        return 'elite';
      if (userTime <= bm.advanced)     return 'advanced';
      if (userTime <= bm.intermediate) return 'intermediate';
      return 'beginner';
    }

    function getRadarScore(userTime, bm) {
      if (!bm || userTime == null) return 0;
      if (userTime <= bm.elite)    return 100;
      if (userTime >= bm.beginner) return 0;
      return Math.round(100 * (bm.beginner - userTime) / (bm.beginner - bm.elite));
    }

    function getPctVsAvg(userTime, bm) {
      if (!bm || userTime == null) return null;
      return Math.round(Math.abs(userTime - bm.intermediate) / bm.intermediate * 100);
    }

    // ─── Reusable components ──────────────────────────────────────────────────────

    function TierBadge({ tier }) {

      const c = TIER_CONFIG[tier];

          fontSize: '0.68rem', fontWeight: 700, color: c.color,

    function ImprovementBadge({ delta }) {
      if (delta == null) return null;
      const faster = delta < 0;
      return (
        <span style={{
          fontSize: '0.72rem', fontWeight: 700,
          color: faster ? '#4ade80' : '#f87171',
          background: faster ? 'rgba(74,222,128,0.08)' : 'rgba(248,113,113,0.08)',

          padding: '0.2rem 0.45rem', borderRadius: 4, fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap',

          {faster ? '↑' : '↓'} {formatTime(Math.abs(delta))}

    }

            <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>

    // ─── Station Line Chart (pure SVG) ───────────────────────────────────────────

    function StationChart({ station, sessions }) {
      const [tooltip, setTooltip] = useState(null);

      const data = sessions
        .filter(s => s.stationId === station.id)
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .map((s, i) => ({ sessionNum: i + 1, time: s.timeInSeconds, date: s.date }));

      if (data.length < 2) return (
        <div style={{ ...cardBase, padding: '1.25rem' }}>
          <div style={{ fontWeight: 700, fontSize: '0.85rem' }}>{station.name}</div>
          <div style={{ fontSize: '0.72rem', color: '#777', marginBottom: '0.75rem' }}>{station.detail}</div>
          <div style={{ color: '#777', fontSize: '0.8rem', textAlign: 'center', padding: '1.5rem 0', border: '1px dashed #1e1e1e', borderRadius: 8 }}>Log 2+ sessions to see chart</div>
        </div>
      );

      const times = data.map(d => d.time);
      const minT = Math.min(...times), maxT = Math.max(...times);

      // SVG layout
      const W = 400, H = 155;
      const padL = 46, padR = 8, padT = 8, padB = 20;
      const plotW = W - padL - padR, plotH = H - padT - padB;

      // Lower time = higher position (line goes up as you improve)
      const toY = t => maxT === minT
        ? padT + plotH / 2
        : padT + plotH * (t - minT) / (maxT - minT);
      const toX = i => padL + (i / (data.length - 1)) * plotW;

      // 3 y-axis ticks
      const yTicks = maxT === minT
        ? [minT]
        : [maxT, Math.round((minT + maxT) / 2), minT];

      const polyPts = data.map((d, i) => `${toX(i)},${toY(d.time)}`).join(' ');

      return (
        <div style={{ ...cardBase, padding: '1.25rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.75rem' }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: '0.85rem' }}>{station.name}</div>
              <div style={{ fontSize: '0.72rem', color: '#777' }}>{station.detail}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '0.62rem', color: '#777', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Best</div>
              <div style={{ fontWeight: 800, color: YELLOW, fontSize: '0.9rem', fontVariantNumeric: 'tabular-nums' }}>{formatTime(minT)}</div>
            </div>
          </div>
          <div style={{ position: 'relative' }}>
            <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block' }}>
              {/* Horizontal grid lines */}
              {yTicks.map((t, i) => (
                <line key={i} x1={padL} x2={W - padR} y1={toY(t)} y2={toY(t)} stroke="#1c1c1c" strokeWidth={1} />
              ))}
              {/* Y-axis labels */}
              {yTicks.map((t, i) => (
                <text key={i} x={padL - 4} y={toY(t) + 4} textAnchor="end" fill="#444" fontSize={9} fontFamily="monospace">{formatTime(t)}</text>
              ))}
              {/* X-axis labels */}
              {data.map((d, i) => (
                <text key={i} x={toX(i)} y={H - 4} textAnchor="middle" fill="#444" fontSize={9}>{d.sessionNum}</text>
              ))}
              {/* Line */}
              <polyline points={polyPts} fill="none" stroke={YELLOW} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
              {/* Dots */}
              {data.map((d, i) => (
                <circle key={i} cx={toX(i)} cy={toY(d.time)} r={4} fill={YELLOW}
                  onMouseEnter={e => setTooltip({ ...d, mx: e.clientX, my: e.clientY })}
                  onMouseLeave={() => setTooltip(null)}
                  style={{ cursor: 'crosshair' }}
                />
              ))}
            </svg>
            {tooltip && (
              <div style={{ position: 'fixed', left: tooltip.mx + 14, top: tooltip.my - 14, background: '#1a1a1a', border: '1px solid #333', borderRadius: 8, padding: '0.4rem 0.7rem', fontSize: '0.8rem', zIndex: 1000, pointerEvents: 'none' }}>
                <div style={{ color: '#888', fontSize: '0.72rem', marginBottom: '0.1rem' }}>Session {tooltip.sessionNum} · {tooltip.date}</div>
                <div style={{ color: YELLOW, fontWeight: 800, fontVariantNumeric: 'tabular-nums' }}>{formatTime(tooltip.time)}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Weakness Radar Chart (pure SVG) ─────────────────────────────────────────

    function WeaknessRadar({ sessions, profile }) {
      const [tooltip, setTooltip] = useState(null);
      const hasProfile = profile.gender && profile.age;

      if (!hasProfile) return (
        <div style={{ ...cardBase, padding: '2rem', textAlign: 'center', color: '#888' }}>
          <div style={{ fontSize: '2rem', marginBottom: '0.75rem' }}>📡</div>
          <div style={{ fontSize: '0.88rem', marginBottom: '0.4rem' }}>Radar analysis requires your profile.</div>
          <div style={{ fontSize: '0.78rem', color: '#777' }}>Add your gender and age in Setup to unlock.</div>
        </div>
      );

      const radarData = STATIONS.map(station => {
        const ss = sessions.filter(s => s.stationId === station.id);
        const pb = ss.length > 0 ? Math.min(...ss.map(s => s.timeInSeconds)) : null;
        const bm = getBenchmark(profile.gender, profile.age, station.id);
        return { label: station.short, score: pb != null ? getRadarScore(pb, bm) : 0, hasData: pb != null };
      });

      const n = radarData.length;
      const avgScore = Math.round(
        radarData.filter(d => d.hasData).reduce((s, d) => s + d.score, 0) /
        Math.max(1, radarData.filter(d => d.hasData).length)
      );

      // SVG polar helpers
      const cx = 200, cy = 190, r = 120, labelR = 148;
      const angleOf = i => -Math.PI / 2 + i * 2 * Math.PI / n;
      const polar = (radius, angle) => [cx + radius * Math.cos(angle), cy + radius * Math.sin(angle)];

      // Grid ring polygon path
      const ringPath = pct => {
        const pts = radarData.map((_, i) => polar(r * pct, angleOf(i)));
        return pts.map(([x, y], i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ') + ' Z';
      };

      // Data polygon
      const dataPath = radarData.map((d, i) => {
        const [x, y] = polar(r * (d.score / 100), angleOf(i));
        return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ') + ' Z';

      return (
        <div style={{ ...cardBase, padding: '1.5rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: '0.95rem' }}>Performance Radar</div>
              <div style={{ fontSize: '0.75rem', color: '#777', marginTop: '0.15rem' }}>
                {profile.gender === 'male' ? 'Male' : 'Female'} · {getAgeGroup(profile.age)} · {profile.division || 'Open'}
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '0.62rem', color: '#777', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Avg Score</div>
              <div style={{ fontWeight: 900, fontSize: '1.4rem', color: avgScore >= 70 ? '#4ade80' : avgScore >= 40 ? YELLOW : '#f87171' }}>{avgScore}</div>
            </div>
          </div>
          <div style={{ position: 'relative' }}>
            <svg viewBox="0 0 400 380" style={{ width: '100%', display: 'block' }}>
              {/* Grid rings */}
              {[0.33, 0.66, 1].map((pct, i) => (
                <path key={i} d={ringPath(pct)} fill="none" stroke="#1e1e1e" strokeWidth={1} />
              ))}
              {/* Ring % labels at top spoke */}
              {[{ pct: 0.33, label: '33' }, { pct: 0.66, label: '66' }, { pct: 1, label: '100' }].map(({ pct, label }) => (
                <text key={label} x={cx + 3} y={cy - r * pct - 3} fill="#2e2e2e" fontSize={8} textAnchor="start">{label}</text>
              ))}
              {/* Spokes */}
              {radarData.map((_, i) => {
                const [ex, ey] = polar(r, angleOf(i));
                return <line key={i} x1={cx} y1={cy} x2={ex.toFixed(1)} y2={ey.toFixed(1)} stroke="#1e1e1e" strokeWidth={1} />;
              })}
              {/* Data fill */}
              <path d={dataPath} fill={YELLOW} fillOpacity={0.13} stroke={YELLOW} strokeWidth={2} strokeLinejoin="round" />
              {/* Data dots + hover */}
              {radarData.map((d, i) => {
                const [dx, dy] = polar(r * (d.score / 100), angleOf(i));
                return (
                  <circle key={i} cx={dx.toFixed(1)} cy={dy.toFixed(1)} r={4}
                    fill={d.hasData ? YELLOW : '#2a2a2a'} stroke={d.hasData ? 'none' : '#444'} strokeWidth={1}
                    onMouseEnter={e => setTooltip({ label: d.label, score: d.score, hasData: d.hasData, mx: e.clientX, my: e.clientY })}
                    onMouseLeave={() => setTooltip(null)}
                    style={{ cursor: 'default' }}
                  />
                );
              })}
              {/* Station labels */}
              {radarData.map((d, i) => {
                const a = angleOf(i);
                const [lx, ly] = polar(labelR, a);
                const anchor = Math.cos(a) > 0.2 ? 'start' : Math.cos(a) < -0.2 ? 'end' : 'middle';
                return (
                  <text key={i} x={lx.toFixed(1)} y={(ly + 4).toFixed(1)}
                    textAnchor={anchor} fill={d.hasData ? '#666' : '#333'}
                    fontSize={9} fontFamily="-apple-system, Arial, sans-serif" fontWeight={600}
                  >{d.label}</text>
                );
              })}
            </svg>
            {tooltip && (
              <div style={{ position: 'fixed', left: tooltip.mx + 14, top: tooltip.my - 14, background: '#1a1a1a', border: '1px solid #333', borderRadius: 8, padding: '0.4rem 0.7rem', fontSize: '0.8rem', zIndex: 1000, pointerEvents: 'none' }}>
                <div style={{ color: '#888', fontSize: '0.72rem', marginBottom: '0.1rem' }}>{tooltip.label}</div>
                <div style={{ color: YELLOW, fontWeight: 800 }}>{tooltip.hasData ? `${tooltip.score}/100` : 'No data yet'}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Training Tips Section ────────────────────────────────────────────────────

    function TrainingTips({ sessions, profile }) {
      const [expanded, setExpanded] = useState(null);
      const hasProfile = profile.gender && profile.age;

      const analyses = STATIONS.map(station => {
        const ss = sessions.filter(s => s.stationId === station.id);
        if (ss.length === 0) return null;
        const pb = Math.min(...ss.map(s => s.timeInSeconds));
        const bm = getBenchmark(profile.gender, profile.age, station.id);
        const tier = getTier(pb, bm);
        const pct = getPctVsAvg(pb, bm);
        const tips = TRAINING_TIPS[station.id];
        const tip = tips?.[tier] || tips?.intermediate;
        const sorted = [...ss].sort((a, b) => new Date(a.date) - new Date(b.date));
        const trend = sorted.length >= 2 ? sorted[sorted.length - 1].timeInSeconds - sorted[sorted.length - 2].timeInSeconds : null;
        const score = bm ? getRadarScore(pb, bm) : null;
        return { station, pb, bm, tier, pct, tip, trend, score };
      }).filter(Boolean).sort((a, b) => (a.score ?? 100) - (b.score ?? 100));

      if (analyses.length === 0) return null;

      return (
        <div>
          <h3 style={{ fontWeight: 800, fontSize: '1rem', marginBottom: '0.9rem', textTransform: 'uppercase', letterSpacing: '0.02em', color: '#777' }}>
            Station Analysis {hasProfile ? '' : <span style={{ fontSize: '0.75rem', color: '#888', fontWeight: 400, textTransform: 'none' }}>— add profile for tier benchmarks</span>}
          </h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.45rem' }}>
            {analyses.map(({ station, pb, bm, tier, pct, tip, trend, score }) => {
              const isOpen = expanded === station.id;
              const c = tier ? TIER_CONFIG[tier] : null;
              return (
                <div key={station.id} style={{ ...cardBase, overflow: 'hidden', border: `1px solid ${isOpen ? '#2a2a2a' : '#1e1e1e'}` }}>
                  {/* Row */}
                  <button
                    onClick={() => setExpanded(isOpen ? null : station.id)}
                    style={{
                      width: '100%', background: 'none', border: 'none', cursor: 'pointer',
                      padding: '0.75rem 1.1rem', display: 'flex', flexDirection: 'column', gap: '0.45rem', textAlign: 'left',
                    }}
                  >
                    {/* Top line: number + name + chevron */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                      <div style={{ width: 22, height: 22, borderRadius: '50%', background: tier ? `${c.color}15` : '#1a1a1a', border: `1px solid ${tier ? `${c.color}30` : '#2a2a2a'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.6rem', fontWeight: 800, color: tier ? c.color : '#555', flexShrink: 0 }}>
                        {station.num}
                      </div>
                      <span style={{ fontWeight: 700, fontSize: '0.88rem', color: '#ddd', flex: 1 }}>{station.name}</span>
                      <span style={{ fontSize: '0.62rem', color: '#888' }}>{station.detail}</span>
                      <span style={{ color: '#555', fontSize: '0.7rem', flexShrink: 0, transform: isOpen ? 'rotate(180deg)' : 'none', transition: 'transform 0.15s' }}>▼</span>
                    </div>

                    {/* Bottom line: stats */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem', flexWrap: 'wrap', paddingLeft: '1.7rem' }}>
                      {trend != null && (
                        <span style={{ fontSize: '0.8rem', color: trend < 0 ? '#4ade80' : '#f87171' }}>{trend < 0 ? '↑' : '↓'}</span>
                      )}
                      {bm && pct != null && (
                        <span style={{ fontSize: '0.72rem', color: pb <= bm.intermediate ? '#4ade80' : '#888', whiteSpace: 'nowrap' }}>
                          {pb < bm.intermediate ? (pct > 0 ? `${pct}% faster` : '~mid') : pb > bm.intermediate ? (pct > 0 ? `${pct}% slower` : '~mid') : 'mid'}
                        </span>
                      )}
                      <span style={{ fontWeight: 800, fontSize: '1rem', fontVariantNumeric: 'tabular-nums', color: YELLOW }}>{formatTime(pb)}</span>
                      {tier && <TierBadge tier={tier} />}
                      {score != null && (
                        <div style={{ width: 28, height: 28, borderRadius: '50%', background: '#0f0f0f', border: '1px solid #2a2a2a', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.63rem', fontWeight: 800, color: score >= 70 ? '#4ade80' : score >= 40 ? YELLOW : '#f87171' }}>
                          {score}
                        </div>
                      )}
                    </div>
                  </button>

                  {/* Expanded tip + benchmark */}
                  {isOpen && (
                    <div style={{ borderTop: '1px solid #1a1a1a', padding: '0.85rem 1.1rem', background: '#0d0d0d' }}>
                      {tip && (
                        <div style={{ marginBottom: bm ? '0.85rem' : 0 }}>
                          <div style={{ fontSize: '0.68rem', fontWeight: 700, color: tier ? c.color : '#555', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.35rem' }}>
                            {tier ? `${c.icon} ${c.label} Tip` : '💡 Training Tip'}
                          </div>
                          <div style={{ fontSize: '0.85rem', color: '#bbb', lineHeight: 1.55 }}>{tip}</div>
                        </div>
                      )}
                      {bm && (() => {
                        const span = bm.beginner - bm.elite;
                        const sMid = Math.round((bm.beginner - bm.intermediate) / span * 100);
                        const sAdv = Math.round((bm.beginner - bm.advanced)     / span * 100);
                        const tiers = [
                          { label: 'Beginner',     val: bm.beginner,     col: '#666',    scoreRange: `0 – ${sMid - 1}` },
                          { label: 'Intermediate', val: bm.intermediate, col: '#60a5fa', scoreRange: `${sMid} – ${sAdv - 1}` },
                          { label: 'Advanced',     val: bm.advanced,     col: '#4ade80', scoreRange: `${sAdv} – 99` },
                          { label: 'Elite',        val: bm.elite,        col: '#FFD700', scoreRange: '100' },
                        ];
                        return (
                          <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>

                              <div key={label} style={{ background: '#111', border: '1px solid #222', borderRadius: 6, padding: '0.4rem 0.7rem', flex: 1, minWidth: 80 }}>

                                <div style={{ fontWeight: 700, fontSize: '0.85rem', color: col, fontVariantNumeric: 'tabular-nums' }}>{formatTime(val)}</div>
                                <div style={{ fontSize: '0.6rem', color: '#444', marginTop: '0.2rem' }}>score {scoreRange}</div>
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Station Detail Page ──────────────────────────────────────────────────────

    function StationDetailPage({ station, sessions, onAdd, onDelete, onBack }) {
      const [date,      setDate]      = useState(today());
      const [timeInput, setTimeInput] = useState('');
      const [error,     setError]     = useState('');
      const [success,   setSuccess]   = useState(false);

      // Stopwatch
      const [swRunning,  setSwRunning]  = useState(false);
      const [swElapsed,  setSwElapsed]  = useState(0);   // ms
      const swStart = React.useRef(null);
      const swTick  = React.useRef(null);

      const swBegin = () => {
        swStart.current = Date.now() - swElapsed;
        swTick.current  = setInterval(() => setSwElapsed(Date.now() - swStart.current), 100);
        setSwRunning(true);
      };
      const swPause = () => {
        clearInterval(swTick.current);
        setSwRunning(false);
      };
      const swFinish = () => {
        clearInterval(swTick.current);
        setSwRunning(false);
        // auto-fill + immediately log
        const totalSecs = Math.round(swElapsed / 1000);
        const m = Math.floor(totalSecs / 60);
        const s = totalSecs % 60;
        const filled = `${m}.${String(s).padStart(2, '0')}`;
        setTimeInput(filled);
        setError('');
        // log immediately
        if (totalSecs > 0) {
          onAdd({ stationId: station.id, date, timeInSeconds: totalSecs });
          setSuccess(true);
          setTimeout(() => { setSuccess(false); setSwElapsed(0); setTimeInput(''); }, 2500);
        }
      };
      const swReset = () => {
        clearInterval(swTick.current);
        setSwRunning(false);
        setSwElapsed(0);
        setTimeInput('');
      };
      React.useEffect(() => () => clearInterval(swTick.current), []);

      const swSecs = Math.floor(swElapsed / 1000);
      const swMins = Math.floor(swSecs / 60);
      const swDisp = `${String(swMins).padStart(2,'0')}:${String(swSecs % 60).padStart(2,'0')}.${String(Math.floor((swElapsed % 1000) / 100))}`;


      const stationSessions = sessions.filter(s => s.stationId === station.id).sort((a, b) => new Date(a.date) - new Date(b.date));
      const displaySessions = [...stationSessions].reverse();
      const pb       = stationSessions.length > 0 ? Math.min(...stationSessions.map(s => s.timeInSeconds)) : null;
      const latest   = stationSessions.length > 0 ? stationSessions[stationSessions.length - 1].timeInSeconds : null;
      const vsPrev   = stationSessions.length >= 2 ? stationSessions[stationSessions.length - 1].timeInSeconds - stationSessions[stationSessions.length - 2].timeInSeconds : null;

      const handleSubmit = () => {
        if (!timeInput.trim()) { setError('Please enter a time.'); return; }
        const secs = parseTime(timeInput);
        if (isNaN(secs) || secs <= 0) { setError('Invalid — use mm:ss or seconds'); return; }
        setError('');
        onAdd({ stationId: station.id, date, timeInSeconds: secs });
        setTimeInput('');
        setSuccess(true);
        setTimeout(() => setSuccess(false), 2000);

              <span style={{ fontSize: '2rem' }}>{station.icon}</span>
              <div>

                <div style={{ fontSize: '0.78rem', color: '#777', marginTop: '0.2rem' }}>{station.detail} · {station.num === '↺' ? 'Run between stations' : `Station ${station.num}`}</div>

            </div>
            {/* Log form inline */}
            <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'flex-end', flexWrap: 'wrap' }}>
              <div>

              <div>
                <div style={{ fontSize: '0.62rem', fontWeight: 700, color: '#777', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.35rem' }}>Time</div>

              </div>
              <button onClick={handleSubmit} style={{ background: success ? '#16a34a' : YELLOW, color: success ? '#fff' : '#000', border: 'none', padding: '0.75rem 1.25rem', borderRadius: 8, fontWeight: 800, fontSize: '0.88rem', cursor: 'pointer', transition: 'all 0.2s', whiteSpace: 'nowrap' }}>

            </div>
          </div>
          {/* Stopwatch */}
          <div style={{ ...cardBase, padding: '1.5rem', marginBottom: '1.5rem', textAlign: 'center' }}>
            <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#777', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.75rem' }}>Stopwatch</div>
            <div style={{ fontWeight: 900, fontSize: '3rem', letterSpacing: '-0.03em', fontVariantNumeric: 'tabular-nums', color: success ? '#4ade80' : swRunning ? YELLOW : swElapsed > 0 ? '#aaa' : '#fff', lineHeight: 1, marginBottom: '1.25rem', fontFamily: 'monospace' }}>
              {success ? '✓ Logged!' : swDisp}
            </div>
            <div style={{ display: 'flex', justifyContent: 'center', gap: '0.75rem' }}>
              {!swRunning && swElapsed === 0 && !success && (
                <button onClick={swBegin} style={{ background: YELLOW, color: '#000', border: 'none', borderRadius: 8, padding: '0.75rem 2.5rem', fontWeight: 800, fontSize: '1rem', cursor: 'pointer' }}>▶ Start</button>
              )}
              {swRunning && (
                <>
                  <button onClick={swPause} style={{ background: '#333', color: '#fff', border: '1px solid #444', borderRadius: 8, padding: '0.75rem 1.5rem', fontWeight: 800, fontSize: '0.95rem', cursor: 'pointer' }}>⏸ Pause</button>
                  <button onClick={swFinish} style={{ background: '#4ade80', color: '#000', border: 'none', borderRadius: 8, padding: '0.75rem 1.5rem', fontWeight: 800, fontSize: '0.95rem', cursor: 'pointer' }}>⏹ Stop & Log</button>
                </>
              )}
              {!swRunning && swElapsed > 0 && !success && (
                <>
                  <button onClick={swBegin} style={{ background: YELLOW, color: '#000', border: 'none', borderRadius: 8, padding: '0.75rem 1.25rem', fontWeight: 800, fontSize: '0.9rem', cursor: 'pointer' }}>▶ Resume</button>
                  <button onClick={swFinish} style={{ background: '#4ade80', color: '#000', border: 'none', borderRadius: 8, padding: '0.75rem 1.25rem', fontWeight: 800, fontSize: '0.9rem', cursor: 'pointer' }}>⏹ Stop & Log</button>
                  <button onClick={swReset} style={{ background: '#1a1a1a', color: '#666', border: '1px solid #333', borderRadius: 8, padding: '0.75rem 1rem', fontWeight: 700, fontSize: '0.9rem', cursor: 'pointer' }}>↺</button>
                </>
              )}
            </div>
          </div>

          {error && <p style={{ color: '#f87171', fontSize: '0.78rem', marginBottom: '0.75rem' }}>{error}</p>}

          {/* Stats row */}
          {stationSessions.length > 0 && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(130px, 1fr))', gap: '0.7rem', marginBottom: '1.5rem' }}>
              {/* PB card with vs-prev inline */}
              <div style={{ ...cardBase, padding: '1.25rem' }}>
                <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#777', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.5rem' }}>Personal Best</div>
                <div style={{ fontWeight: 900, fontSize: '1.9rem', color: YELLOW, letterSpacing: '-0.02em', lineHeight: 1.1 }}>{formatTime(pb)}</div>
                {vsPrev !== null && (
                  <div style={{ fontSize: '0.72rem', color: vsPrev < 0 ? '#4ade80' : '#f87171', marginTop: '0.35rem', fontWeight: 600 }}>
                    {vsPrev < 0 ? `↑ ${formatTime(Math.abs(vsPrev))} faster` : vsPrev > 0 ? `↓ ${formatTime(Math.abs(vsPrev))} slower` : 'same as prev'}
                  </div>
                )}
              </div>
              <StatCard label="Last Session"   value={formatTime(latest)} />
              <StatCard label="Total Sessions" value={stationSessions.length} />
            </div>

          {/* Chart */}
          {stationSessions.length >= 2 && (
            <div style={{ marginBottom: '1.5rem' }}>
              <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#777', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.75rem' }}>Progress Over Time</div>

                  const isPB = session.timeInSeconds === pb;
                  const isLatest = i === 0;
                  return (
                    <div key={session.id} style={{ background: isLatest ? '#161616' : '#0d0d0d', border: `1px solid ${isLatest ? '#2a2a2a' : '#1a1a1a'}`, borderRadius: 8, padding: '0.75rem 1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '0.5rem' }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                          <span style={{ fontSize: '0.68rem', fontWeight: 700, color: '#444', minWidth: '1.2rem' }}>#{displaySessions.length - i}</span>
                          <span style={{ fontSize: '0.78rem', color: '#777' }}>{formatDate(session.date)}</span>
                        </div>
                        <div style={{ display: 'flex', gap: '0.35rem', marginTop: '0.12rem', paddingLeft: '1.7rem' }}>
                          {isLatest && <span style={{ fontSize: '0.58rem', fontWeight: 700, color: '#000', background: YELLOW, padding: '0.1rem 0.3rem', borderRadius: 3 }}>LATEST</span>}
                          {isPB    && <span style={{ fontSize: '0.58rem', fontWeight: 700, color: YELLOW, border: `1px solid ${YELLOW}`, padding: '0.1rem 0.3rem', borderRadius: 3 }}>PB</span>}
                        </div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.45rem', flexShrink: 0 }}>
                        <span style={{ fontWeight: 800, fontSize: '1rem', fontVariantNumeric: 'tabular-nums' }}>{formatTime(session.timeInSeconds)}</span>
                        <ImprovementBadge delta={delta} />
                        <button onClick={() => onDelete(session.id)} style={{ background: 'none', border: 'none', color: '#2a2a2a', cursor: 'pointer', fontSize: '0.9rem', padding: '0.1rem 0.25rem', borderRadius: 4, transition: 'color 0.12s' }} onMouseEnter={e => e.target.style.color = '#f87171'} onMouseLeave={e => e.target.style.color = '#2a2a2a'} title="Delete">×</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

                >

                        <div style={{ fontWeight: 900, fontSize: '1.2rem', color: YELLOW, fontVariantNumeric: 'tabular-nums' }}>{formatTime(pb)}</div>
                      </div>
                      <div style={{ textAlign: 'right' }}>
                        <div style={{ fontSize: '0.6rem', color: '#777', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Sessions</div>
                        <div style={{ fontWeight: 700, fontSize: '1rem' }}>{ss.length}</div>
                      </div>
                    </div>
                  ) : (
                    <div style={{ fontSize: '0.78rem', color: '#444', fontStyle: 'italic' }}>No sessions yet</div>
                  )}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Weekly Progress ─────────────────────────────────────────────────────────

    function WeeklyProgress({ sessions }) {
      // Monday-anchored calendar weeks
      const now = new Date();
      const dow = now.getDay(); // 0 = Sun
      const startThis = new Date(now);
      startThis.setDate(now.getDate() - ((dow + 6) % 7));
      startThis.setHours(0, 0, 0, 0);
      const startLast = new Date(startThis);
      startLast.setDate(startThis.getDate() - 7);

      const inThis = s => { const d = new Date(s.date + 'T00:00:00'); return d >= startThis; };
      const inLast = s => { const d = new Date(s.date + 'T00:00:00'); return d >= startLast && d < startThis; };

      const rows = STATIONS.map(station => {
        const tw = sessions.filter(s => s.stationId === station.id && inThis(s));
        const lw = sessions.filter(s => s.stationId === station.id && inLast(s));
        if (!tw.length || !lw.length) return null;
        const bestThis = Math.min(...tw.map(s => s.timeInSeconds));
        const bestLast = Math.min(...lw.map(s => s.timeInSeconds));
        const delta = bestThis - bestLast;          // negative = faster = good
        const pct   = Math.round(Math.abs(delta) / bestLast * 100);
        return { station, bestThis, bestLast, delta, pct };
      }).filter(Boolean);

      if (!rows.length) return null;

      const improved = rows.filter(r => r.delta < 0);
      const avgPct   = improved.length
        ? Math.round(improved.reduce((s, r) => s + r.pct, 0) / improved.length)
        : 0;

      const weekLabel = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      const range = `${weekLabel(startLast)} – ${weekLabel(new Date(startThis.getTime() - 86400000))} vs ${weekLabel(startThis)} – ${weekLabel(now)}`;

      return (
        <div style={{ ...cardBase, padding: '1.5rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1.1rem' }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: '0.95rem' }}>Weekly Progress</div>
              <div style={{ fontSize: '0.7rem', color: '#888', marginTop: '0.2rem' }}>{range}</div>
            </div>
            {improved.length > 0 && (
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: '0.6rem', color: '#777', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.2rem' }}>Avg gain</div>
                <div style={{ fontWeight: 900, fontSize: '1.5rem', color: '#4ade80', lineHeight: 1 }}>+{avgPct}%</div>
              </div>
            )}
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem' }}>
            {rows.map(({ station, bestThis, bestLast, delta, pct }) => {
              const faster = delta < 0;
              const barW   = Math.min(pct, 50); // cap bar at 50% visual
              return (
                <div key={station.id} style={{ padding: '0.6rem 0.85rem', background: '#0d0d0d', border: '1px solid #1a1a1a', borderRadius: 8 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                    <span style={{ fontSize: '0.95rem', flexShrink: 0 }}>{station.icon}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 600, fontSize: '0.82rem', marginBottom: '0.15rem' }}>{station.name}</div>
                      <div style={{ fontSize: '0.68rem', color: '#777', fontVariantNumeric: 'tabular-nums' }}>
                        {formatTime(bestLast)} → {formatTime(bestThis)}
                      </div>
                    </div>
                    <div style={{ textAlign: 'right', flexShrink: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: '0.95rem', color: faster ? '#4ade80' : '#f87171' }}>
                        {faster ? '↑' : '↓'} {pct}% · {formatTime(Math.abs(delta))}
                      </div>
                      <div style={{ fontSize: '0.65rem', color: faster ? '#4ade80' : '#f87171' }}>
                        {faster ? 'faster' : 'slower'}
                      </div>
                    </div>
                  </div>
                  {/* Progress bar */}
                  <div style={{ marginTop: '0.45rem', height: 3, background: '#1a1a1a', borderRadius: 2, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${barW * 2}%`, background: faster ? '#4ade80' : '#f87171', borderRadius: 2, opacity: 0.6 }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Dashboard Page ───────────────────────────────────────────────────────────

    function DashboardPage({ sessions, profile, onTabChange }) {
      const totalSessions   = sessions.length;
      const sortedByDate    = [...sessions].sort((a, b) => new Date(b.date) - new Date(a.date));
      const lastActive      = sortedByDate[0]?.date ?? null;
      const days            = getDaysUntil(profile.competitionDate);
      const hasProfile      = profile.gender && profile.age;

      const stationData = useMemo(() => STATIONS.map(station => {
        const ss = sessions.filter(s => s.stationId === station.id);
        if (ss.length === 0) return { station, pb: null, count: 0, trend: null, bm: null, tier: null, score: null };
        const pb = Math.min(...ss.map(s => s.timeInSeconds));
        const sorted = [...ss].sort((a, b) => new Date(a.date) - new Date(b.date));
        const trend = sorted.length >= 2 ? sorted[sorted.length - 1].timeInSeconds - sorted[sorted.length - 2].timeInSeconds : null;
        const bm = getBenchmark(profile.gender, profile.age, station.id);
        const tier = getTier(pb, bm);
        const score = bm ? getRadarScore(pb, bm) : null;
        return { station, pb, count: ss.length, trend, bm, tier, score };
      }), [sessions, profile]);

      const stationsWithData = stationData.filter(d => d.pb !== null);
      const stationsComplete = stationsWithData.length;

      if (totalSessions === 0) {
        return (
          <div className="fade-in" style={{ textAlign: 'center', padding: '5rem 1rem' }}>
            <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>🏋️</div>
            <h2 style={{ fontWeight: 900, fontSize: '1.8rem', marginBottom: '0.75rem', letterSpacing: '-0.03em' }}>No sessions yet</h2>
            <p style={{ color: '#777', fontSize: '0.9rem', marginBottom: '2rem' }}>Start logging training sessions to see your analysis here.</p>
            <button onClick={() => onTabChange('log')} style={{ background: YELLOW, color: '#000', border: 'none', padding: '0.9rem 2rem', borderRadius: 8, fontWeight: 800, cursor: 'pointer', fontSize: '0.95rem' }}>Log First Session →</button>
          </div>
        );
      }

      const QUOTES = [
        "Every rep is a deposit in the bank of race day.",
        "You're not just training your body — you're training your mind to never quit.",
        "The sled doesn't care how tired you are. Neither should you.",
        "Progress is made in the sessions nobody sees.",
        "Race day is just another training day — you've already done the hard part.",
        "Fatigue is temporary. A finish line crossed is forever.",
        "You showed up. That's already more than most.",
        "Train hard enough that race day feels like a relief.",
        "Eight stations. Eight chances to prove something to yourself.",
        "The only bad session is the one you didn't do.",
        "Strong enough to start. Tough enough to finish.",
        "Your future self is cheering for you right now.",
      ];
      const quote = QUOTES[Math.floor(new Date().getDate() % QUOTES.length)];

      return (
        <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '2.5rem' }}>

          {/* Greeting */}
          <div>
            <h2 style={{ fontWeight: 900, fontSize: '1.55rem', letterSpacing: '-0.03em', marginBottom: '0.4rem' }}>
              Welcome back{profile.name ? `, ${profile.name}` : ''}. 👊
            </h2>
            <p style={{ fontSize: '0.88rem', color: '#666', fontStyle: 'italic', lineHeight: 1.5 }}>"{quote}"</p>
          </div>

          {/* Summary stats */}
          {(() => {
            const totalPB = stationsWithData.reduce((sum, d) => sum + (d.station.id === 'run-1km' ? d.pb * 8 : d.pb), 0);
            // Previous total: per station, PB from all sessions except the most recent one
            const prevPB = stationsWithData.reduce((sum, d) => {
              const ss = sessions.filter(s => s.stationId === d.station.id).sort((a, b) => new Date(a.date) - new Date(b.date));
              const withoutLatest = ss.slice(0, -1);
              if (!withoutLatest.length) return sum + (d.station.id === 'run-1km' ? d.pb * 8 : d.pb);
              const prev = Math.min(...withoutLatest.map(s => s.timeInSeconds));
              return sum + (d.station.id === 'run-1km' ? prev * 8 : prev);
            }, 0);
            const delta = totalPB - prevPB; // negative = faster = improved
            const absDelta = Math.abs(Math.round(delta / 60)); // in minutes
            return (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))', gap: '0.7rem' }}>
                <StatCard label="Total Sessions" value={totalSessions} />
                <StatCard label="Stations Tracked" value={stationsComplete} suffix={`/ ${STATIONS.length}`} />
                {stationsWithData.length > 0 && delta !== 0 && (
                  <div style={{ background: '#111', border: '1px solid #222', borderRadius: 12, padding: '1.25rem' }}>
                    <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#777', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.5rem' }}>vs Prev Total</div>
                    <div style={{ fontWeight: 900, fontSize: '1.9rem', color: '#fff', letterSpacing: '-0.02em', lineHeight: 1.1 }}>
                      {delta < 0 ? '-' : '+'}{absDelta}m
                    </div>
                    <div style={{ fontSize: '0.72rem', color: delta < 0 ? '#4ade80' : '#f87171', marginTop: '0.3rem' }}>{delta < 0 ? 'faster overall' : 'slower overall'}</div>
                  </div>
                )}
                <StatCard label="Total PB Time" value={stationsWithData.length > 0 ? formatDuration(totalPB) : '—'} sub={`${stationsWithData.length} station${stationsWithData.length !== 1 ? 's' : ''} combined`} accent />
              </div>
            );
          })()}

          {/* Weekly Progress */}
          <WeeklyProgress sessions={sessions} />

          {/* Profile pill */}
          {hasProfile && (
            <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
              {[
                profile.gender === 'male'
                  ? <span key="gender" style={{ fontSize: '0.75rem', fontWeight: 600, color: '#888', background: '#141414', border: '1px solid #222', padding: '0.25rem 0.6rem', borderRadius: 20, display: 'inline-flex', alignItems: 'center', gap: '0.3rem' }}><span style={{ fontSize: '0.85rem', lineHeight: 1 }}>♂</span>Male</span>
                  : <span key="gender" style={{ fontSize: '0.75rem', fontWeight: 600, color: '#888', background: '#141414', border: '1px solid #222', padding: '0.25rem 0.6rem', borderRadius: 20, display: 'inline-flex', alignItems: 'center', gap: '0.3rem' }}><span style={{ fontSize: '0.85rem', lineHeight: 1 }}>♀</span>Female</span>,
                `${getAgeGroup(profile.age)} age group`,
                profile.division ? (profile.division === 'pro' ? '⭐ Pro' : 'Open') : 'Open',
                profile.weight ? `${profile.weight} kg` : null,
              ].filter(Boolean).map((t, i) => typeof t === 'string'
                ? <span key={i} style={{ fontSize: '0.75rem', fontWeight: 600, color: '#888', background: '#141414', border: '1px solid #222', padding: '0.25rem 0.6rem', borderRadius: 20 }}>{t}</span>
                : t
              )}
            </div>
          )}

          {/* Station Analysis (enhanced PB table) */}
          <TrainingTips sessions={sessions} profile={profile} />

          {/* Radar + weakest tips row */}
          {stationsWithData.length >= 3 && (
            <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1.1fr) minmax(0, 0.9fr)', gap: '1rem', alignItems: 'start' }}>
              <WeaknessRadar sessions={sessions} profile={profile} />

              {/* Weakest stations tips */}
              <div style={{ ...cardBase, padding: '1.25rem' }}>
                <div style={{ fontWeight: 800, fontSize: '0.9rem', marginBottom: '0.25rem' }}>Focus Areas</div>
                <div style={{ fontSize: '0.75rem', color: '#777', marginBottom: '0.5rem' }}>Your 3 lowest-scoring logged stations</div>
                <div style={{ fontSize: '0.68rem', color: '#444', background: '#0d0d0d', border: '1px solid #1a1a1a', borderRadius: 6, padding: '0.5rem 0.7rem', marginBottom: '1rem', lineHeight: 1.5 }}>
                  Score = how close your PB is to Elite (0 = Beginner, 100 = Elite). Only stations you've logged appear here — log more stations to get a fuller picture.
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                  {stationsWithData
                    .sort((a, b) => (a.score ?? 100) - (b.score ?? 100))
                    .slice(0, 3)
                    .map(({ station, pb, bm, tier, score }) => {
                      const pct = getPctVsAvg(pb, bm);
                      const tip = TRAINING_TIPS[station.id]?.[tier || 'beginner'];
                      return (
                        <div key={station.id} style={{ paddingBottom: '0.75rem', borderBottom: '1px solid #1a1a1a' }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.4rem' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                              <span style={{ fontSize: '0.85rem' }}>{station.icon}</span>
                              <span style={{ fontWeight: 700, fontSize: '0.82rem' }}>{station.name}</span>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', flexShrink: 0 }}>
                              {score != null && <span style={{ fontSize: '0.7rem', fontWeight: 700, color: score < 40 ? '#f87171' : YELLOW }}>{score}/100</span>}
                              {tier && <TierBadge tier={tier} />}
                            </div>
                          </div>
                          {bm && pct != null && (
                            <div style={{ fontSize: '0.72rem', color: pb <= bm.intermediate ? '#4ade80' : '#888', marginBottom: '0.35rem' }}>
                              {pb < bm.intermediate ? (pct > 0 ? `${pct}% faster than intermediate` : '~intermediate') : pct > 0 ? `${pct}% slower than intermediate` : '~intermediate'}
                            </div>
                          )}
                          {tip && <div style={{ fontSize: '0.78rem', color: '#888', lineHeight: 1.5 }}>{tip.split('.')[0]}.</div>}
                        </div>
                      );
                    })}
                </div>
              </div>
            </div>
          )}

          {/* Progress Charts */}
          {stationsWithData.length > 0 && (
            <div>
              <h3 style={{ fontWeight: 800, fontSize: '1rem', marginBottom: '0.9rem', textTransform: 'uppercase', letterSpacing: '0.02em', color: '#777' }}>Progress Charts</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(290px, 1fr))', gap: '0.7rem' }}>
                {stationsWithData.map(({ station }) => <StationChart key={station.id} station={station} sessions={sessions} />)}
              </div>
              <p style={{ marginTop: '0.6rem', fontSize: '0.72rem', color: '#2a2a2a', textAlign: 'right' }}>Y-axis reversed — line going up = faster ↑</p>
            </div>
          )}
        </div>
      );
    }

    // ─── Root App ─────────────────────────────────────────────────────────────────

    function App() {
      const [profile,  setProfile]  = useState(() => loadLS(LS_PROFILE, {}));
      const [sessions, setSessions] = useState(() => loadLS(LS_SESSIONS, []));
      const [tab,      setTab]      = useState(profile.name ? 'dashboard' : 'setup');

      useEffect(() => { localStorage.setItem(LS_PROFILE,  JSON.stringify(profile));  }, [profile]);
      useEffect(() => { localStorage.setItem(LS_SESSIONS, JSON.stringify(sessions)); }, [sessions]);

      const addSession    = useCallback((s) => setSessions(prev => [...prev, { ...s, id: Date.now() + Math.random() }]), []);
      const deleteSession = useCallback((id) => setSessions(prev => prev.filter(s => s.id !== id)), []);

      return (
        <div style={{ minHeight: '100vh', background: '#0a0a0a', color: '#fff' }}>
          {/* Sticky top bar + nav */}
          <div style={{ position: 'sticky', top: 0, zIndex: 100 }}>
            <TopBar profile={profile} onEdit={() => setTab('setup')} />
            <nav style={{ background: '#0d0d0d', borderBottom: '1px solid #1a1a1a', padding: '0 1rem' }}>
              <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex' }}>
                {[{ id: 'dashboard', label: 'Dashboard' }, { id: 'log', label: '+ Log Session' }].map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    style={{ padding: '0.72rem 1.1rem', background: 'none', border: 'none', borderBottom: `2px solid ${tab === t.id ? YELLOW : 'transparent'}`, color: tab === t.id ? YELLOW : '#555', fontWeight: tab === t.id ? 700 : 400, cursor: 'pointer', fontSize: '0.86rem', transition: 'all 0.15s', outline: 'none', letterSpacing: '0.02em' }}>
                    {t.label}
                  </button>
                ))}
              </div>
            </nav>
          </div>

          <main style={{ maxWidth: 1100, margin: '0 auto', padding: '2rem 1rem 4rem' }}>
            {tab === 'setup'     && <SetupPage    profile={profile}   onSave={p => { setProfile(p); if (p.name) setTab('dashboard'); }} />}
            {tab === 'log'       && <LogPage      sessions={sessions} onAdd={addSession} onDelete={deleteSession} />}
            {tab === 'dashboard' && <DashboardPage sessions={sessions} profile={profile} onTabChange={setTab} />}
          </main>

          <div style={{ borderTop: '1px solid #111', padding: '1.25rem 1rem', textAlign: 'center' }}>
            <p style={{ fontSize: '0.7rem', color: '#444', marginBottom: '0.5rem' }}>isurvivehyrox · data stored locally in your browser</p>
            <p style={{ fontSize: '0.82rem', color: '#666', marginBottom: '0.3rem' }}>Made with 💛 by Pie Prapawuttikul</p>
            <p style={{ fontSize: '0.78rem', color: '#555' }}>If this saved your race · ☕ <a href="https://venmo.com/u/pirpie" target="_blank" style={{ color: YELLOW, textDecoration: 'none' }}>venmo.com/u/pirpie</a></p>
          </div>
        </div>
      );
    }

    // Responsive log page grid
    const styleEl = document.createElement('style');
    styleEl.textContent = `@media (max-width: 680px) { .fade-in > div[style*="grid-template-columns: minmax"] { grid-template-columns: 1fr !important; } }`;
    document.head.appendChild(styleEl);

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
