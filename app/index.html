    function LogPage({ sessions, profile, onAdd, onDelete }) {
      const [selected, setSelected] = useState(null);

      if (selected) {
        const station = STATIONS.find(s => s.id === selected);
        return <StationDetailPage station={station} sessions={sessions} profile={profile} onAdd={onAdd} onDelete={onDelete} onBack={() => setSelected(null)} />;
      }

      const division = (profile && profile.division) || 'open';
      const gender   = (profile && profile.gender)   || 'male';

      return (
        <div className="fade-in">
          <h2 style={{ fontWeight: 900, fontSize: '1.6rem', marginBottom: '0.4rem', letterSpacing: '-0.03em' }}>Log a Session</h2>
          <p style={{ color: '#999', fontSize: '0.88rem', marginBottom: '1.75rem' }}>Select a station to log your time or view history.</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: '0.7rem' }}>
            {[...STATIONS].sort((a, b) => a.id === 'run-1km' ? -1 : b.id === 'run-1km' ? 1 : 0).map(station => {
              const ss = sessions.filter(s => s.stationId === station.id).sort((a, b) => new Date(a.date) - new Date(b.date));
              const pb     = ss.length > 0 ? Math.min(...ss.map(s => s.timeInSeconds)) : null;
              const latest = ss.length > 0 ? ss[ss.length - 1].timeInSeconds : null;
              const trend  = ss.length >= 2 ? ss[ss.length - 1].timeInSeconds - ss[ss.length - 2].timeInSeconds : null;
              const getCardPace = (session) => {
                if (!session.distance) return null;
                const [d, u] = session.distance.split(' ');
                const dist = parseFloat(d);
                if (!dist || dist <= 0) return null;
                const distKm = u === 'mi' ? dist * 1.60934 : dist;
                return session.timeInSeconds / distKm;
              };
              const paceSessions = station.id === 'run-1km' ? ss.filter(s => getCardPace(s) !== null) : [];
              const bestPaceSecs = paceSessions.length > 0 ? Math.min(...paceSessions.map(s => getCardPace(s))) : null;
              const pbDisplay = station.id === 'run-1km' && bestPaceSecs
                ? (() => { const m = Math.floor(bestPaceSecs/60); const s = Math.round(bestPaceSecs%60); return `${m}:${String(s).padStart(2,'0')}/km`; })()
                : pb !== null ? formatTime(pb) : null;
              const weight = EQUIPMENT_WEIGHTS[station.id]?.[division]?.[gender];
              return (
                <button key={station.id} onClick={() => { setSelected(station.id); if (typeof gtag !== 'undefined') gtag('event', 'view_benchmark', { station_id: station.id }); }}
                  style={{ ...cardBase, padding: '1.1rem 1.25rem', cursor: 'pointer', textAlign: 'left', border: '1px solid #222', transition: 'border-color 0.15s', background: '#111' }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = YELLOW}
                  onMouseLeave={e => e.currentTarget.style.borderColor = '#222'}
                >
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.4rem' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <span style={{ fontSize: '1.3rem' }}>{station.icon}</span>
                      <span style={{ fontWeight: 700, fontSize: '0.95rem', color: '#fff' }}>{station.name}</span>
                    </div>
                    {trend !== null && (
                      <span style={{ fontSize: '0.9rem', color: trend < 0 ? '#4ade80' : '#f87171' }}>{trend < 0 ? '↑' : '↓'}</span>
                    )}
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', marginBottom: '0.3rem', flexWrap: 'wrap' }}>
                    <span style={{ fontSize: '0.72rem', color: '#999' }}>{station.detail}</span>
                    {weight && (
                      <span style={{ fontSize: '0.65rem', color: '#888', background: '#1a1a1a', border: '1px solid #2a2a2a', borderRadius: 10, padding: '0.1rem 0.45rem' }}>{weight}</span>
                    )}
                  </div>
                  {pb !== null ? (
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                      <div>
                        <div style={{ fontSize: '0.6rem', color: '#999', textTransform: 'uppercase', letterSpacing: '0.06em' }}>{station.id === 'run-1km' && bestPaceSecs ? 'Best Pace' : 'PB'}</div>
                        <div style={{ fontWeight: 900, fontSize: '1.2rem', color: YELLOW, fontVariantNumeric: 'tabular-nums' }}>{pbDisplay || formatTime(pb)}</div>
                      </div>
                      <div style={{ textAlign: 'right', flexShrink: 0, minWidth: '2.5rem' }}>
                        <div style={{ fontSize: '0.6rem', color: '#999', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Sessions</div>
                        <div style={{ fontWeight: 700, fontSize: '1rem', color: '#fff' }}>{ss.length}</div>

                  ) : (
                    <div style={{ fontSize: '0.78rem', color: '#888', fontStyle: 'italic' }}>No sessions yet</div>
                  )}
                </button>
              );
            })}
          </div>
        </div>
      );

    // ─── Weekly Progress ─────────────────────────────────────────────────────────

    function WeeklyProgress({ sessions }) {
      // Monday-anchored calendar weeks
      const now = new Date();
      const dow = now.getDay(); // 0 = Sun
      const startThis = new Date(now);
      startThis.setDate(now.getDate() - ((dow + 6) % 7));
      startThis.setHours(0, 0, 0, 0);
      const startLast = new Date(startThis);
      startLast.setDate(startThis.getDate() - 7);

      const inThis = s => { const d = new Date(s.date + 'T00:00:00'); return d >= startThis; };
      const inLast = s => { const d = new Date(s.date + 'T00:00:00'); return d >= startLast && d < startThis; };

      const rows = STATIONS.map(station => {
        const tw = sessions.filter(s => s.stationId === station.id && inThis(s));
        const lw = sessions.filter(s => s.stationId === station.id && inLast(s));
        if (!tw.length || !lw.length) return null;
        const bestThis = Math.min(...tw.map(s => s.timeInSeconds));
        const bestLast = Math.min(...lw.map(s => s.timeInSeconds));
        const delta = bestThis - bestLast;          // negative = faster = good
        const pct   = Math.round(Math.abs(delta) / bestLast * 100);
        return { station, bestThis, bestLast, delta, pct };
      }).filter(Boolean);

      if (!rows.length) return null;

      const improved = rows.filter(r => r.delta < 0);
      const avgPct   = improved.length
        ? Math.round(improved.reduce((s, r) => s + r.pct, 0) / improved.length)
        : 0;

      const weekLabel = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      const range = `${weekLabel(startLast)} – ${weekLabel(new Date(startThis.getTime() - 86400000))} vs ${weekLabel(startThis)} – ${weekLabel(now)}`;

      return (
        <div style={{ ...cardBase, padding: '1.5rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1.1rem' }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: '0.95rem' }}>Weekly Progress</div>
              <div style={{ fontSize: '0.7rem', color: '#888', marginTop: '0.2rem' }}>{range}</div>
            </div>
            {improved.length > 0 && (
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: '0.6rem', color: '#999', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.2rem' }}>Avg gain</div>
                <div style={{ fontWeight: 900, fontSize: '1.5rem', color: '#4ade80', lineHeight: 1 }}>+{avgPct}%</div>
              </div>
            )}
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem' }}>
            {rows.map(({ station, bestThis, bestLast, delta, pct }) => {
              const faster = delta < 0;
              const barW   = Math.min(pct, 50); // cap bar at 50% visual
              return (
                <div key={station.id} style={{ padding: '0.6rem 0.85rem', background: '#0d0d0d', border: '1px solid #1a1a1a', borderRadius: 8 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                    <span style={{ fontSize: '0.95rem', flexShrink: 0 }}>{station.icon}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 600, fontSize: '0.82rem', marginBottom: '0.15rem' }}>{station.name}</div>
                      <div style={{ fontSize: '0.68rem', color: '#999', fontVariantNumeric: 'tabular-nums' }}>
                        {formatTime(bestLast)} → {formatTime(bestThis)}
                      </div>
                    </div>
                    <div style={{ textAlign: 'right', flexShrink: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: '0.95rem', color: faster ? '#4ade80' : '#f87171' }}>
                        {faster ? '↑' : '↓'} {pct}% · {formatTime(Math.abs(delta))}
                      </div>
                      <div style={{ fontSize: '0.65rem', color: faster ? '#4ade80' : '#f87171' }}>
                        {faster ? 'faster' : 'slower'}
                      </div>
                    </div>
                  </div>
                  {/* Progress bar */}
                  <div style={{ marginTop: '0.45rem', height: 3, background: '#1a1a1a', borderRadius: 2, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${barW * 2}%`, background: faster ? '#4ade80' : '#f87171', borderRadius: 2, opacity: 0.6 }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Dashboard Page ───────────────────────────────────────────────────────────

    function DashboardPage({ sessions, profile, onTabChange }) {
      const totalSessions   = sessions.length;
      const sortedByDate    = [...sessions].sort((a, b) => new Date(b.date) - new Date(a.date));
      const lastActive      = sortedByDate[0]?.date ?? null;
      const days            = getDaysUntil(profile.competitionDate);
      const hasProfile      = profile.gender && profile.age;

      const stationData = useMemo(() => STATIONS.map(station => {
        const ss = sessions.filter(s => s.stationId === station.id);
        if (ss.length === 0) return { station, pb: null, count: 0, trend: null, bm: null, tier: null, score: null };
        const pb = Math.min(...ss.map(s => s.timeInSeconds));
        const sorted = [...ss].sort((a, b) => new Date(a.date) - new Date(b.date));
        const trend = sorted.length >= 2 ? sorted[sorted.length - 1].timeInSeconds - sorted[sorted.length - 2].timeInSeconds : null;
        const bm = getBenchmark(profile.gender, profile.age, station.id);
        const tier = getTier(pb, bm);
        const score = bm ? getRadarScore(pb, bm) : null;
        return { station, pb, count: ss.length, trend, bm, tier, score };
      }), [sessions, profile]);

      const stationsWithData = stationData.filter(d => d.pb !== null);
      const stationsComplete = stationsWithData.length;

      // Weekly stations: unique stations logged Mon–Sun of current week
      const weeklyStations = useMemo(() => {
        const now = new Date();
        const dow = (now.getDay() + 6) % 7; // 0=Mon
        const weekStart = new Date(now); weekStart.setDate(now.getDate() - dow); weekStart.setHours(0,0,0,0);
        const weekEnd   = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 7);
        const ids = new Set(sessions.filter(s => {
          const d = new Date(s.date + 'T00:00:00');
          return d >= weekStart && d < weekEnd;
        }).map(s => s.stationId));
        return ids.size;
      }, [sessions]);

      if (totalSessions === 0) {
        return (
          <div className="fade-in" style={{ textAlign: 'center', padding: '5rem 1rem' }}>
            <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>🏋️</div>
            <h2 style={{ fontWeight: 900, fontSize: '1.8rem', marginBottom: '0.75rem', letterSpacing: '-0.03em' }}>No sessions yet</h2>
            <p style={{ color: '#999', fontSize: '0.9rem', marginBottom: '2rem' }}>Start logging training sessions to see your analysis here.</p>
            <button onClick={() => onTabChange('log')} style={{ background: YELLOW, color: '#000', border: 'none', padding: '0.9rem 2rem', borderRadius: 8, fontWeight: 800, cursor: 'pointer', fontSize: '0.95rem' }}>Log First Session →</button>
          </div>
        );
      }

      const QUOTES = [
        "Every rep is a deposit in the bank of race day.",
        "You're not just training your body — you're training your mind to never quit.",
        "The sled doesn't care how tired you are. Neither should you.",
        "Progress is made in the sessions nobody sees.",
        "Race day is just another training day — you've already ✓ done the hard part.",
        "Fatigue is temporary. A finish line crossed is forever.",
        "You showed up. That's already more than most.",
        "Train hard enough that race day feels like a relief.",
        "Eight stations. Eight chances to prove something to yourself.",
        "The only bad session is the one you didn't do.",
        "Strong enough to start. Tough enough to finish.",
        "Your future self is cheering for you right now.",
      ];
      const quote = QUOTES[Math.floor(new Date().getDate() % QUOTES.length)];

      return (
        <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '2.5rem' }}>

          {/* Greeting */}
          <div>
            <h2 style={{ fontWeight: 900, fontSize: '1.55rem', letterSpacing: '-0.03em', marginBottom: '0.4rem' }}>
              Welcome back{profile.name ? `, ${profile.name}` : ''}. {profile.country ? COUNTRIES.find(c => c.code === profile.country)?.flag : '👊'}
            </h2>
            <p style={{ fontSize: '0.88rem', color: '#888', fontStyle: 'italic', lineHeight: 1.5 }}>"{quote}"</p>
          </div>

          {/* Summary stats */}
          {(() => {
            // For 1km run: best pace × 8km
            const runTotal = (ss) => {
              if (!ss.length) return 0;
              const getPace = (s) => {
                if (!s.distance) return null;
                const [d, u] = s.distance.split(' ');
                const dist = parseFloat(d);
                if (!dist || dist <= 0) return null;
                return s.timeInSeconds / (u === 'mi' ? dist * 1.60934 : dist);
              };
              const withPace = ss.filter(s => getPace(s) !== null);
              if (withPace.length > 0) return Math.round(Math.min(...withPace.map(s => getPace(s))) * 8);
              // fallback if no distance logged
              const sorted = [...ss].sort((a, b) => new Date(a.date) - new Date(b.date));
              if (sorted.length >= 8) return sorted.slice(-8).reduce((s, r) => s + r.timeInSeconds, 0);
              return Math.round(sorted.reduce((s, r) => s + r.timeInSeconds, 0) / sorted.length * 8);
            };
            const totalPB = stationsWithData.reduce((sum, d) => {
              if (d.station.id === 'run-1km') {
                const ss = sessions.filter(s => s.stationId === 'run-1km');
                return sum + runTotal(ss);
              }
              return sum + d.pb;
            }, 0);
            // Previous total: per station, PB from all sessions except the most recent one
            const prevPB = stationsWithData.reduce((sum, d) => {
              const ss = sessions.filter(s => s.stationId === d.station.id).sort((a, b) => new Date(a.date) - new Date(b.date));
              const withoutLatest = ss.slice(0, -1);
              if (d.station.id === 'run-1km') return sum + runTotal(withoutLatest);
              if (!withoutLatest.length) return sum + d.pb;
              const prev = Math.min(...withoutLatest.map(s => s.timeInSeconds));
              return sum + prev;
            }, 0);
            const delta = totalPB - prevPB; // negative = faster = improved
            const absDelta = Math.abs(Math.round(delta / 60)); // in minutes
            return (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))', gap: '0.7rem' }}>
                <StatCard label="Total Sessions" value={totalSessions} />
                <StatCard label="This Week" value={weeklyStations} suffix={`/ ${STATIONS.length}`} sub="stations" />
                {stationsWithData.length > 0 && delta !== 0 && (
                  <div style={{ background: '#111', border: '1px solid #222', borderRadius: 12, padding: '1.25rem' }}>
                    <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#999', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.5rem' }}>vs Prev Total</div>
                    <div style={{ fontWeight: 900, fontSize: '1.9rem', color: '#fff', letterSpacing: '-0.02em', lineHeight: 1.1 }}>
                      {delta < 0 ? '-' : '+'}{absDelta}m
                    </div>
                    <div style={{ fontSize: '0.72rem', color: delta < 0 ? '#4ade80' : '#f87171', marginTop: '0.3rem' }}>{delta < 0 ? 'faster overall' : 'slower overall'}</div>
                  </div>
                )}
                {(() => { const runSessions = sessions.filter(s => s.stationId === 'run-1km');
                  const runNote = runSessions.length >= 8 ? 'run: last 8 splits' : runSessions.length > 0 ? `run: avg×8 (${runSessions.length}/8 logged)` : null;
                  return <StatCard label="Total PB Time" value={stationsWithData.length > 0 ? formatDuration(totalPB) : '—'} sub={runNote || `${stationsWithData.length} station${stationsWithData.length !== 1 ? 's' : ''} combined`} accent />;
                })()}
              </div>
            );
          })()}

          {/* Weekly Progress */}
          <WeeklyProgress sessions={sessions} />

          {/* Profile pill */}
          {hasProfile && (
            <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
              {(() => {
                const pillStyle = { fontSize: '0.75rem', fontWeight: 600, color: '#888', background: '#141414', border: '1px solid #222', padding: '0.25rem 0.6rem', borderRadius: 20 };
                const countryObj = profile.country ? COUNTRIES.find(c => c.code === profile.country) : null;
                return [
                  profile.gender === 'male'
                    ? <span key="gender" style={pillStyle}>Male</span>
                    : <span key="gender" style={pillStyle}>Female</span>,
                  <span key="age" style={pillStyle}>{getAgeGroup(profile.age)} age group</span>,
                  <span key="div" style={pillStyle}>{profile.division === 'pro' ? '⭐ Pro' : profile.division === '60+' ? '60+' : 'Open'}</span>,
                  profile.weight ? <span key="wt" style={pillStyle}>{profile.weight} kg</span> : null,
                  countryObj ? <span key="country" style={{ ...pillStyle, fontSize: '1rem', padding: '0.15rem 0.5rem' }} title={countryObj.name}>{countryObj.flag}</span> : null,
                ].filter(Boolean);
              })()}
            </div>
          )}

          {/* Total Time Analysis */}
          <TotalTimeAnalysis sessions={sessions} profile={profile} />

          {/* Station Analysis (enhanced PB table) */}
          <TrainingTips sessions={sessions} profile={profile} />

          {/* Radar + weakest tips row */}
          {stationsWithData.length >= 3 && (
            <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1.1fr) minmax(0, 0.9fr)', gap: '1rem', alignItems: 'start' }}>
              <WeaknessRadar sessions={sessions} profile={profile} />

              {/* Weakest stations tips */}
              <div style={{ ...cardBase, padding: '1.25rem' }}>
                <div style={{ fontWeight: 800, fontSize: '0.9rem', marginBottom: '0.25rem' }}>Focus Areas</div>
                <div style={{ fontSize: '0.75rem', color: '#999', marginBottom: '0.5rem' }}>Your 3 lowest-scoring logged stations</div>
                <div style={{ fontSize: '0.68rem', color: '#888', background: '#0d0d0d', border: '1px solid #1a1a1a', borderRadius: 6, padding: '0.5rem 0.7rem', marginBottom: '1rem', lineHeight: 1.5 }}>
                  Score = how close your PB is to Elite (0 = Beginner, 100 = Elite). Only stations you've logged appear here — log more stations to get a fuller picture.
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                  {stationsWithData
                    .sort((a, b) => (a.score ?? 100) - (b.score ?? 100))
                    .slice(0, 3)
                    .map(({ station, pb, bm, tier, score }) => {
                      const pct = getPctVsAvg(pb, bm);
                      const tip = TRAINING_TIPS[station.id]?.[tier || 'beginner'];
                      return (
                        <div key={station.id} style={{ paddingBottom: '0.75rem', borderBottom: '1px solid #1a1a1a' }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.4rem' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                              <span style={{ fontSize: '0.85rem' }}>{station.icon}</span>
                              <span style={{ fontWeight: 700, fontSize: '0.82rem' }}>{station.name}</span>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', flexShrink: 0 }}>
                              {score != null && <span style={{ fontSize: '0.7rem', fontWeight: 700, color: score < 40 ? '#f87171' : YELLOW }}>{score}/100</span>}
                              {tier && <TierBadge tier={tier} />}
                            </div>
                          </div>
                          {bm && pct != null && (
                            <div style={{ fontSize: '0.72rem', color: pb <= bm.intermediate ? '#4ade80' : '#888', marginBottom: '0.35rem' }}>
                              {pb < bm.intermediate ? (pct > 0 ? `${pct}% faster than intermediate` : '~intermediate') : pct > 0 ? `${pct}% slower than intermediate` : '~intermediate'}
                            </div>
                          )}
                          {tip && <div style={{ fontSize: '0.78rem', color: '#888', lineHeight: 1.5 }}>{tip.split('.')[0]}.</div>}
                        </div>
                      );
                    })}
                </div>
              </div>
            </div>
          )}

          {/* Progress Charts */}
          {stationsWithData.length > 0 && (
            <div>
              <h3 style={{ fontWeight: 800, fontSize: '1rem', marginBottom: '0.9rem', textTransform: 'uppercase', letterSpacing: '0.02em', color: '#999' }}>Progress Charts</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(290px, 1fr))', gap: '0.7rem' }}>
                {stationsWithData.map(({ station }) => <StationChart key={station.id} station={station} sessions={sessions} />)}
              </div>
              <p style={{ marginTop: '0.6rem', fontSize: '0.72rem', color: '#2a2a2a', textAlign: 'right' }}>Y-axis reversed — line going up = faster ↑</p>
            </div>
          )}
        </div>
      );
    }

    // ─── Root App ─────────────────────────────────────────────────────────────────

    function App() {
      const [profile,  setProfile]  = useState(() => loadLS(LS_PROFILE, {}));
      const [sessions, setSessions] = useState(() => loadLS(LS_SESSIONS, []));
      const [tab,      setTab]      = useState(profile.name ? 'dashboard' : 'setup');

      useEffect(() => { localStorage.setItem(LS_PROFILE,  JSON.stringify(profile));  }, [profile]);
      useEffect(() => { localStorage.setItem(LS_SESSIONS, JSON.stringify(sessions)); }, [sessions]);

      const addSession    = useCallback((s) => {
        setSessions(prev => [...prev, { ...s, id: Date.now() + Math.random() }]);
        if (typeof gtag !== 'undefined') {
          const st = STATIONS.find(x => x.id === s.stationId);
          gtag('event', 'log_session', {
            station:      st ? st.name : s.stationId,
            station_id:   s.stationId,
            time_seconds: s.timeInSeconds,
          });
        }
      }, []);
      const deleteSession = useCallback((id) => setSessions(prev => prev.filter(s => s.id !== id)), []);

      return (
        <div style={{ minHeight: '100vh', background: '#0a0a0a', color: '#fff', display: 'flex', flexDirection: 'column' }}>
          {/* Sticky top bar + nav */}
          <div style={{ position: 'sticky', top: 0, zIndex: 100 }}>
            <TopBar profile={profile} onEdit={() => setTab('setup')} />
            <nav style={{ background: '#0d0d0d', borderBottom: '1px solid #1a1a1a', padding: '0 1rem' }}>
              <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex' }}>
                {[{ id: 'dashboard', label: 'Dashboard' }, { id: 'log', label: '+ Log Session' }, { id: 'calendar', label: 'Journal' }].map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    style={{ padding: '0.72rem 1.1rem', background: 'none', border: 'none', borderBottom: `2px solid ${tab === t.id ? YELLOW : 'transparent'}`, color: tab === t.id ? YELLOW : '#555', fontWeight: tab === t.id ? 700 : 400, cursor: 'pointer', fontSize: '0.86rem', transition: 'all 0.15s', outline: 'none', letterSpacing: '0.02em' }}>
                    {t.label}
                  </button>
                ))}
              </div>
            </nav>
          </div>

          <main style={{ maxWidth: 1100, margin: '0 auto', padding: '2rem 1rem 4rem', flex: 1, width: '100%' }}>
            {tab === 'setup'     && <SetupPage    profile={profile}   onSave={p => {
              const isFirstProfile = !profile.name && !!p.name;
              const dateChanged    = !!p.competitionDate && p.competitionDate !== profile.competitionDate;
              setProfile(p);
              if (typeof gtag !== 'undefined') {
                gtag('event', 'profile_save', { gender: p.gender, age_group: getAgeGroup(p.age), division: p.division, country: p.country || null });
                if (isFirstProfile) gtag('event', 'create_profile', { gender: p.gender, age_group: getAgeGroup(p.age), division: p.division, country: p.country || null });
                if (dateChanged)    gtag('event', 'set_race_date',  { days_until: getDaysUntil(p.competitionDate) });
              }
              if (p.name) setTab('dashboard');
            }} />}
            {tab === 'log'       && <LogPage      sessions={sessions} profile={profile} onAdd={addSession} onDelete={deleteSession} />}
            {tab === 'dashboard' && <DashboardPage sessions={sessions} profile={profile} onTabChange={setTab} />}
            {tab === 'calendar'  && <CalendarPage sessions={sessions} profile={profile} onDelete={deleteSession} />}
          </main>

          <div style={{ borderTop: '1px solid #111', padding: '1.25rem 1rem', textAlign: 'center' }}>
            <p style={{ fontSize: '0.7rem', color: '#888', marginBottom: '0.5rem' }}>isurvivehyrox · data stored locally in your browser</p>
            <div style={{ marginBottom: '0.75rem' }}>
              <span style={{ fontSize: '0.82rem', color: '#666' }}>
                Made with 💛 by{' '}
                <a href="https://pirpie.com" target="_blank" rel="noopener noreferrer" style={{ color: '#888', textDecoration: 'none', borderBottom: '1px solid #444' }}>Pie</a>
                {' '}&amp;{' '}
                <a href="https://www.instagram.com/mvngkcrn/" target="_blank" rel="noopener noreferrer" style={{ color: '#888', textDecoration: 'none', borderBottom: '1px solid #444' }}>Korn</a>
                <span style={{ color: '#333', margin: '0 0.5rem' }}>|</span>
                <a href="mailto:hello@isurvivehyrox.com" style={{ color: '#888', textDecoration: 'none', borderBottom: '1px solid #444' }}>hello@isurvivehyrox.com</a>
              </span>
            </div>
            <p style={{ fontSize: '0.75rem', color: '#888' }}>If this saved your race ☕ <span style={{ color: YELLOW }}>→</span> <a href="https://ko-fi.com/isurvivehyrox" target="_blank" rel="noopener noreferrer" style={{ color: YELLOW, textDecoration: 'none' }}>Support us</a> :)</p>
          </div>
        </div>
      );
    }

    // Responsive log page grid
    const styleEl = document.createElement('style');
    styleEl.textContent = `@media (max-width: 680px) { .fade-in > div[style*="grid-template-columns: minmax"] { grid-template-columns: 1fr !important; } }`;
    document.head.appendChild(styleEl);

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
