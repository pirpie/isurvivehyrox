          // h:mm:ss — right-pad single digits: "1.2.3" → 1:20:30
          const hrs = parseInt(parts[0], 10);
          const minStr = parts[1].length === 1 ? parts[1] + '0' : parts[1];
          const secStr = parts[2].length === 1 ? parts[2] + '0' : parts[2];
          const mins = parseInt(minStr, 10), secs = parseInt(secStr, 10);
          if (!isNaN(hrs) && !isNaN(mins) && !isNaN(secs) && mins < 60 && secs < 60)
            return hrs * 3600 + mins * 60 + secs;
          return NaN;
        }
        if (parts.length === 2) {
          // m:ss — right-pad single digit: "5.3" → 5:30, "5.03" → 5:03
          const mins = parseInt(parts[0], 10);
          const secStr = parts[1].length === 1 ? parts[1] + '0' : parts[1];
          const secs = parseInt(secStr, 10);
          if (!isNaN(mins) && !isNaN(secs) && secs < 60) return mins * 60 + secs;
          return NaN;
        }
      }
      // Bare integer → treat as minutes (e.g. "5" → 5:00 = 300s)
      const n = parseInt(s, 10);
      return isNaN(n) ? NaN : n * 60;
    }

    function formatTime(secs) {
      if (secs == null || isNaN(secs)) return '--:--';
      const t = Math.round(Math.abs(secs));
      if (t >= 3600) {
        const h = Math.floor(t / 3600);
        const m = Math.floor((t % 3600) / 60);
        const s = t % 60;
        return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }
      return `${String(Math.floor(t / 60)).padStart(2, '0')}:${String(t % 60).padStart(2, '0')}`;
    }

    function formatDuration(secs) {
      if (secs == null || isNaN(secs)) return '--:--:--';
      const t = Math.round(Math.abs(secs));
      const h = Math.floor(t / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function getDaysUntil(dateStr) {
      if (!dateStr) return null;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      return Math.round((new Date(dateStr + 'T00:00:00') - today) / 86400000);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      try { return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
      catch { return dateStr; }
    }

    function loadLS(key, fallback) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }

    function today() { return new Date().toISOString().split('T')[0]; }

    function getAgeGroup(age) {
      const a = parseInt(age, 10);
      if (isNaN(a)) return null;
      if (a < 25) return '16-24'; if (a < 30) return '25-29'; if (a < 35) return '30-34';
      if (a < 40) return '35-39'; if (a < 45) return '40-44'; if (a < 50) return '45-49';
      if (a < 55) return '50-54'; if (a < 60) return '55-59'; return '60+';
    }

    function getBenchmark(gender, age, stationId) {
      if (!gender || !age) return null;
      const base = BASE_BENCHMARKS[gender]?.[stationId];
      if (!base) return null;
      const ageGroup = getAgeGroup(age);
      const f = AGE_FACTORS[ageGroup] || 1.0;
      return {
        elite:        Math.round(base.elite * f),
        advanced:     Math.round(base.advanced * f),
        intermediate: Math.round(base.intermediate * f),
        beginner:     Math.round(base.beginner * f),
        ageGroup,
      };
    }

    function getTier(userTime, bm) {
      if (!bm || userTime == null) return null;
      if (userTime <= bm.elite)        return 'elite';
      if (userTime <= bm.advanced)     return 'advanced';
      if (userTime <= bm.intermediate) return 'intermediate';
      return 'beginner';
    }

    function getRadarScore(userTime, bm) {
      if (!bm || userTime == null) return 0;
      if (userTime <= bm.elite)    return 100;
      if (userTime >= bm.beginner) return 0;
      return Math.round(100 * (bm.beginner - userTime) / (bm.beginner - bm.elite));
    }

    function getPctVsAvg(userTime, bm) {
      if (!bm || userTime == null) return null;
      return Math.round(Math.abs(userTime - bm.intermediate) / bm.intermediate * 100);
    }

    // ─── Station Line Chart (pure SVG) ───────────────────────────────────────────

    function StationChart({ station, sessions }) {
      const [tooltip, setTooltip] = useState(null);

      const data = sessions
        .filter(s => s.stationId === station.id)
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .map((s, i) => ({ sessionNum: i + 1, time: s.timeInSeconds, date: s.date }));

      if (data.length < 2) return (
        <div style={{ ...cardBase, padding: '1.25rem' }}>
          <div style={{ fontWeight: 700, fontSize: '0.85rem' }}>{station.name}</div>
          <div style={{ fontSize: '0.72rem', color: '#999', marginBottom: '0.75rem' }}>{station.detail}</div>
          <div style={{ color: '#999', fontSize: '0.8rem', textAlign: 'center', padding: '1.5rem 0', border: '1px dashed #1e1e1e', borderRadius: 8 }}>Log 2+ sessions to see chart</div>
        </div>
      );

      const times = data.map(d => d.time);
      const minT = Math.min(...times), maxT = Math.max(...times);

      // SVG layout
      const W = 400, H = 155;
      const padL = 46, padR = 8, padT = 8, padB = 20;
      const plotW = W - padL - padR, plotH = H - padT - padB;

      // Lower time = higher position (line goes up as you improve)
      const toY = t => maxT === minT
        ? padT + plotH / 2
        : padT + plotH * (t - minT) / (maxT - minT);
      const toX = i => padL + (i / (data.length - 1)) * plotW;

      // 3 y-axis ticks
      const yTicks = maxT === minT
        ? [minT]
        : [maxT, Math.round((minT + maxT) / 2), minT];

      const polyPts = data.map((d, i) => `${toX(i)},${toY(d.time)}`).join(' ');

      return (
        <div style={{ ...cardBase, padding: '1.25rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.75rem' }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: '0.85rem' }}>{station.name}</div>
              <div style={{ fontSize: '0.72rem', color: '#999' }}>{station.detail}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '0.62rem', color: '#999', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Best</div>
              <div style={{ fontWeight: 800, color: YELLOW, fontSize: '0.9rem', fontVariantNumeric: 'tabular-nums' }}>{formatTime(minT)}</div>
            </div>
          </div>
          <div style={{ position: 'relative' }}>
            <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block' }}>
              {/* Horizontal grid lines */}
              {yTicks.map((t, i) => (
                <line key={i} x1={padL} x2={W - padR} y1={toY(t)} y2={toY(t)} stroke="#1c1c1c" strokeWidth={1} />
              ))}
              {/* Y-axis labels */}
              {yTicks.map((t, i) => (
                <text key={i} x={padL - 4} y={toY(t) + 4} textAnchor="end" fill="#444" fontSize={9} fontFamily="monospace">{formatTime(t)}</text>
              ))}
              {/* X-axis labels */}
              {data.map((d, i) => (
                <text key={i} x={toX(i)} y={H - 4} textAnchor="middle" fill="#444" fontSize={9}>{d.sessionNum}</text>
              ))}
              {/* Line */}
              <polyline points={polyPts} fill="none" stroke={YELLOW} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
              {/* Dots */}
              {data.map((d, i) => (
                <circle key={i} cx={toX(i)} cy={toY(d.time)} r={4} fill={YELLOW}
                  onMouseEnter={e => setTooltip({ ...d, mx: e.clientX, my: e.clientY })}
                  onMouseLeave={() => setTooltip(null)}
                  style={{ cursor: 'crosshair' }}
                />
              ))}
            </svg>
            {tooltip && (
              <div style={{ position: 'fixed', left: tooltip.mx + 14, top: tooltip.my - 14, background: '#1a1a1a', border: '1px solid #333', borderRadius: 8, padding: '0.4rem 0.7rem', fontSize: '0.8rem', zIndex: 1000, pointerEvents: 'none' }}>
                <div style={{ color: '#888', fontSize: '0.72rem', marginBottom: '0.1rem' }}>Session {tooltip.sessionNum} · {tooltip.date}</div>
                <div style={{ color: YELLOW, fontWeight: 800, fontVariantNumeric: 'tabular-nums' }}>{formatTime(tooltip.time)}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Total Time Analysis ──────────────────────────────────────────────────────

    function TotalTimeAnalysis({ sessions, profile }) {
      const [expanded, setExpanded] = useState(false);
      if (!profile.gender || !profile.age) return null;
      const gender = profile.gender || 'male';
      const ageGroup = getAgeGroup(profile.age);
      const af = AGE_FACTORS[ageGroup] || 1.0;
      const bms = BASE_BENCHMARKS[gender] || BASE_BENCHMARKS.male;

      const totalBMs = {};
      ['elite','advanced','intermediate','beginner'].forEach(tier => {
        let total = 0;
        Object.entries(bms).forEach(([sid, bm]) => {
          const val = Math.round(bm[tier] * af);
          total += sid === 'run-1km' ? val * 8 : val;
        });
        totalBMs[tier] = total;
      });

      const runPaceSecsPerKm = (session) => {
        if (!session.distance) return null;
        const [d, u] = session.distance.split(' ');
        const dist = parseFloat(d);
        if (!dist || dist <= 0) return null;
        const distKm = u === 'mi' ? dist * 1.60934 : dist;
        return session.timeInSeconds / distKm;
      };
      const runTotalFn = (ss) => {
        if (!ss.length) return 0;
        const withPace = ss.filter(s => runPaceSecsPerKm(s) !== null);
        if (withPace.length > 0) {
          const bestPace = Math.min(...withPace.map(s => runPaceSecsPerKm(s)));
          return Math.round(bestPace * 8); // best pace × 8km
        }
        // fallback: no distance logged yet
        const sorted = [...ss].sort((a, b) => new Date(a.date) - new Date(b.date));
        if (sorted.length >= 8) return sorted.slice(-8).reduce((s, r) => s + r.timeInSeconds, 0);
        const avg = sorted.reduce((s, r) => s + r.timeInSeconds, 0) / sorted.length;
        return Math.round(avg * 8);
      };

      const stationsWithData = STATIONS.map(st => {
        const ss = sessions.filter(s => s.stationId === st.id);
        if (!ss.length) return null;
        const pb = st.id === 'run-1km' ? runTotalFn(ss) : Math.min(...ss.map(s => s.timeInSeconds));
        return { st, pb };
      }).filter(Boolean);

      const totalPB = stationsWithData.reduce((sum, d) => sum + d.pb, 0);
      const stationCount = stationsWithData.length;
      const complete = stationCount === STATIONS.length;

      if (!complete) return (
        <div style={{ ...cardBase, padding: '1.25rem', display: 'flex', alignItems: 'center', gap: '1rem' }}>
          <div style={{ fontSize: '1.5rem', opacity: 0.25 }}>🏁</div>
          <div>
            <div style={{ fontWeight: 800, fontSize: '0.9rem', color: '#888' }}>Total Time Analysis</div>
            <div style={{ fontSize: '0.72rem', color: '#888', marginTop: '0.2rem' }}>
              Log all {STATIONS.length} stations to unlock your full race time breakdown
            </div>
            <div style={{ fontSize: '0.68rem', color: '#888', marginTop: '0.3rem' }}>
              {stationCount}/{STATIONS.length} stations tracked
            </div>
          </div>
        </div>
      );
      const tier = getTier(totalPB, totalBMs);
      const tc = tier ? TIER_CONFIG[tier] : null;
      const pct = Math.round(Math.abs(totalPB - totalBMs.intermediate) / totalBMs.intermediate * 100);
      const faster = totalPB < totalBMs.intermediate;

      // How far to next tier
      const tierOrder = ['elite','advanced','intermediate','beginner'];
      const tierIdx = tierOrder.indexOf(tier);
      const nextTier = tierIdx > 0 ? tierOrder[tierIdx - 1] : null;
      const toNext = nextTier ? totalPB - totalBMs[nextTier] : null;

      return (
        <div style={{ ...cardBase, padding: '1.25rem', cursor: 'pointer' }} onClick={() => setExpanded(e => !e)}>
          {/* Header row */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: '0.9rem' }}>Total Time Analysis</div>

    // ─── Weakness Radar Chart (pure SVG) ─────────────────────────────────────────

    function WeaknessRadar({ sessions, profile }) {
      const [tooltip, setTooltip] = useState(null);
      const hasProfile = profile.gender && profile.age;

      if (!hasProfile) return (
        <div style={{ ...cardBase, padding: '2rem', textAlign: 'center', color: '#888' }}>
          <div style={{ fontSize: '2rem', marginBottom: '0.75rem' }}>📡</div>
          <div style={{ fontSize: '0.88rem', marginBottom: '0.4rem' }}>Radar analysis requires your profile.</div>
          <div style={{ fontSize: '0.78rem', color: '#999' }}>Add your gender and age in Setup to unlock.</div>
        </div>
      );

      const radarData = STATIONS.map(station => {
        const ss = sessions.filter(s => s.stationId === station.id);
        const pb = ss.length > 0 ? Math.min(...ss.map(s => s.timeInSeconds)) : null;
        const bm = getBenchmark(profile.gender, profile.age, station.id);
        return { label: station.short, score: pb != null ? getRadarScore(pb, bm) : 0, hasData: pb != null };
      });

      const n = radarData.length;
      const avgScore = Math.round(
        radarData.filter(d => d.hasData).reduce((s, d) => s + d.score, 0) /
        Math.max(1, radarData.filter(d => d.hasData).length)
      );

      // SVG polar helpers
      const cx = 200, cy = 190, r = 120, labelR = 148;
      const angleOf = i => -Math.PI / 2 + i * 2 * Math.PI / n;
      const polar = (radius, angle) => [cx + radius * Math.cos(angle), cy + radius * Math.sin(angle)];

      // Grid ring polygon path
      const ringPath = pct => {
        const pts = radarData.map((_, i) => polar(r * pct, angleOf(i)));
        return pts.map(([x, y], i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ') + ' Z';
      };

      // Data polygon
      const dataPath = radarData.map((d, i) => {
        const [x, y] = polar(r * (d.score / 100), angleOf(i));
        return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ') + ' Z';

      return (
        <div style={{ ...cardBase, padding: '1.5rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: '0.95rem' }}>Performance Radar</div>
              <div style={{ fontSize: '0.75rem', color: '#999', marginTop: '0.15rem' }}>
                {profile.gender === 'male' ? 'Male' : 'Female'} · {getAgeGroup(profile.age)} · {profile.division || 'Open'}
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '0.62rem', color: '#999', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Avg Score</div>
              <div style={{ fontWeight: 900, fontSize: '1.4rem', color: avgScore >= 70 ? '#4ade80' : avgScore >= 40 ? YELLOW : '#f87171' }}>{avgScore}</div>
            </div>
          </div>
          <div style={{ position: 'relative' }}>
            <svg viewBox="0 0 400 380" style={{ width: '100%', display: 'block' }}>
              {/* Grid rings */}
              {[0.33, 0.66, 1].map((pct, i) => (
                <path key={i} d={ringPath(pct)} fill="none" stroke="#1e1e1e" strokeWidth={1} />
              ))}
              {/* Ring % labels at top spoke */}
              {[{ pct: 0.33, label: '33' }, { pct: 0.66, label: '66' }, { pct: 1, label: '100' }].map(({ pct, label }) => (
                <text key={label} x={cx + 3} y={cy - r * pct - 3} fill="#2e2e2e" fontSize={8} textAnchor="start">{label}</text>
              ))}
              {/* Spokes */}
              {radarData.map((_, i) => {
                const [ex, ey] = polar(r, angleOf(i));
                return <line key={i} x1={cx} y1={cy} x2={ex.toFixed(1)} y2={ey.toFixed(1)} stroke="#1e1e1e" strokeWidth={1} />;
              })}
              {/* Data fill */}
              <path d={dataPath} fill={YELLOW} fillOpacity={0.13} stroke={YELLOW} strokeWidth={2} strokeLinejoin="round" />
              {/* Data dots + hover */}
              {radarData.map((d, i) => {
                const [dx, dy] = polar(r * (d.score / 100), angleOf(i));
                return (
                  <circle key={i} cx={dx.toFixed(1)} cy={dy.toFixed(1)} r={4}
                    fill={d.hasData ? YELLOW : '#2a2a2a'} stroke={d.hasData ? 'none' : '#444'} strokeWidth={1}
                    onMouseEnter={e => setTooltip({ label: d.label, score: d.score, hasData: d.hasData, mx: e.clientX, my: e.clientY })}
                    onMouseLeave={() => setTooltip(null)}
                    style={{ cursor: 'default' }}
                  />
                );
              })}
              {/* Station labels */}
              {radarData.map((d, i) => {
                const a = angleOf(i);
                const [lx, ly] = polar(labelR, a);
                const anchor = Math.cos(a) > 0.2 ? 'start' : Math.cos(a) < -0.2 ? 'end' : 'middle';
                return (
                  <text key={i} x={lx.toFixed(1)} y={(ly + 4).toFixed(1)}
                    textAnchor={anchor} fill={d.hasData ? '#666' : '#333'}
                    fontSize={9} fontFamily="-apple-system, Arial, sans-serif" fontWeight={600}
                  >{d.label}</text>
                );
              })}
            </svg>
            {tooltip && (
              <div style={{ position: 'fixed', left: tooltip.mx + 14, top: tooltip.my - 14, background: '#1a1a1a', border: '1px solid #333', borderRadius: 8, padding: '0.4rem 0.7rem', fontSize: '0.8rem', zIndex: 1000, pointerEvents: 'none' }}>
                <div style={{ color: '#888', fontSize: '0.72rem', marginBottom: '0.1rem' }}>{tooltip.label}</div>
                <div style={{ color: YELLOW, fontWeight: 800 }}>{tooltip.hasData ? `${tooltip.score}/100` : 'No data yet'}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Training Tips Section ────────────────────────────────────────────────────

    function TrainingTips({ sessions, profile }) {
      const [expanded, setExpanded] = useState(null);
      const hasProfile = profile.gender && profile.age;

      const getSessionPace = (s) => {
        if (!s.distance) return null;
        const [d, u] = s.distance.split(' ');
        const dist = parseFloat(d);
        if (!dist || dist <= 0) return null;
        return s.timeInSeconds / (u === 'mi' ? dist * 1.60934 : dist);
      };
      const analyses = STATIONS.map(station => {
        const ss = sessions.filter(s => s.stationId === station.id);
        if (ss.length === 0) return null;
        const pb = Math.min(...ss.map(s => s.timeInSeconds));
        const withPace = ss.filter(s => getSessionPace(s) !== null);
        const bestPaceSecs = withPace.length > 0 ? Math.min(...withPace.map(s => getSessionPace(s))) : null;
        const bm = getBenchmark(profile.gender, profile.age, station.id);
        const tier = getTier(pb, bm);
        const pct = getPctVsAvg(pb, bm);
        const tips = TRAINING_TIPS[station.id];
        const tip = tips?.[tier] || tips?.intermediate;
        const sorted = [...ss].sort((a, b) => new Date(a.date) - new Date(b.date));
        const trend = station.id === 'run-1km' && withPace.length >= 2
          ? getSessionPace(withPace[withPace.length - 1]) - getSessionPace(withPace[withPace.length - 2])
          : sorted.length >= 2 ? sorted[sorted.length - 1].timeInSeconds - sorted[sorted.length - 2].timeInSeconds : null;
        const score = bm ? getRadarScore(pb, bm) : null;
        return { station, pb, bestPaceSecs, bm, tier, pct, tip, trend, score };
      }).filter(Boolean).sort((a, b) => (a.score ?? 100) - (b.score ?? 100));

      if (analyses.length === 0) return null;

      return (
        <div>
          <h3 style={{ fontWeight: 800, fontSize: '1rem', marginBottom: '0.9rem', textTransform: 'uppercase', letterSpacing: '0.02em', color: '#999' }}>
            Station Analysis {hasProfile ? '' : <span style={{ fontSize: '0.75rem', color: '#888', fontWeight: 400, textTransform: 'none' }}>— add profile for tier benchmarks</span>}
          </h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.45rem' }}>
            {analyses.map(({ station, pb, bestPaceSecs, bm, tier, pct, tip, trend, score }) => {
              const isOpen = expanded === station.id;
              const c = tier ? TIER_CONFIG[tier] : null;
              return (
                <div key={station.id} style={{ ...cardBase, overflow: 'hidden', border: `1px solid ${isOpen ? '#2a2a2a' : '#1e1e1e'}` }}>
                  {/* Row */}
                  <button
                    onClick={() => setExpanded(isOpen ? null : station.id)}
                    style={{
                      width: '100%', background: 'none', border: 'none', cursor: 'pointer',
                      padding: '0.75rem 1.1rem', display: 'flex', flexDirection: 'column', gap: '0.45rem', textAlign: 'left',
                    }}
                  >
                    {/* Top line: number + name + chevron */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                      <div style={{ width: 22, height: 22, borderRadius: '50%', background: tier ? `${c.color}15` : '#1a1a1a', border: `1px solid ${tier ? `${c.color}30` : '#2a2a2a'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.6rem', fontWeight: 800, color: tier ? c.color : '#555', flexShrink: 0 }}>
                        {station.num}
                      </div>
                      <span style={{ fontWeight: 700, fontSize: '0.88rem', color: '#ddd', flex: 1 }}>{station.name}</span>
                      <span style={{ fontSize: '0.62rem', color: '#888' }}>{station.detail}</span>
                      <span style={{ color: '#888', fontSize: '0.7rem', flexShrink: 0, transform: isOpen ? 'rotate(180deg)' : 'none', transition: 'transform 0.15s' }}>▼</span>
                    </div>

                    {/* Bottom line: stats */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem', flexWrap: 'wrap', paddingLeft: '1.7rem' }}>
                      {trend != null && (
                        <span style={{ fontSize: '0.8rem', color: trend < 0 ? '#4ade80' : '#f87171' }}>{trend < 0 ? '↑' : '↓'}</span>
                      )}
                      {bm && pct != null && (
                        <span style={{ fontSize: '0.72rem', color: pb <= bm.intermediate ? '#4ade80' : '#888', whiteSpace: 'nowrap' }}>
                          {pb < bm.intermediate ? (pct > 0 ? `${pct}% faster` : '~mid') : pb > bm.intermediate ? (pct > 0 ? `${pct}% slower` : '~mid') : 'mid'}
                        </span>
                      )}
                      <span style={{ fontWeight: 800, fontSize: '1rem', fontVariantNumeric: 'tabular-nums', color: YELLOW }}>
                        {station.id === 'run-1km' && bestPaceSecs
                          ? (() => { const m = Math.floor(bestPaceSecs/60); const s = Math.round(bestPaceSecs%60); return `${m}:${String(s).padStart(2,'0')}/km`; })()
                          : formatTime(pb)}
                      </span>
                      {tier && <TierBadge tier={tier} />}
                      {score != null && (
                        <div style={{ width: 28, height: 28, borderRadius: '50%', background: '#0f0f0f', border: '1px solid #2a2a2a', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.63rem', fontWeight: 800, color: score >= 70 ? '#4ade80' : score >= 40 ? YELLOW : '#f87171' }}>
                          {score}
                        </div>
                      )}
                    </div>
                  </button>

                  {/* Expanded tip + benchmark */}
                  {isOpen && (
                    <div style={{ borderTop: '1px solid #1a1a1a', padding: '0.85rem 1.1rem', background: '#0d0d0d' }}>
                      {tip && (
                        <div style={{ marginBottom: bm ? '0.85rem' : 0 }}>
                          <div style={{ fontSize: '0.68rem', fontWeight: 700, color: tier ? c.color : '#555', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.35rem' }}>
                            {tier ? `${c.icon} ${c.label} Tip` : '💡 Training Tip'}
                          </div>
                          <div style={{ fontSize: '0.85rem', color: '#bbb', lineHeight: 1.55 }}>{tip}</div>
                        </div>
                      )}
                      {bm && (() => {
                        const span = bm.beginner - bm.elite;
                        const sMid = Math.round((bm.beginner - bm.intermediate) / span * 100);
                        const sAdv = Math.round((bm.beginner - bm.advanced)     / span * 100);
                        const tiers = [
                          { label: 'Beginner',     val: bm.beginner,     col: '#666',    scoreRange: `0 – ${sMid - 1}` },
                          { label: 'Intermediate', val: bm.intermediate, col: '#60a5fa', scoreRange: `${sMid} – ${sAdv - 1}` },
                          { label: 'Advanced',     val: bm.advanced,     col: '#4ade80', scoreRange: `${sAdv} – 99` },
                          { label: 'Elite',        val: bm.elite,        col: '#FFD700', scoreRange: '100' },
                        ];
                        return (
                          <div className="tier-grid">
                            {tiers.map(({ label, val, col, scoreRange }) => (
                              <div key={label} style={{ background: '#111', border: '1px solid #222', borderRadius: 6, padding: '0.4rem 0.7rem' }}>
                                <div style={{ fontSize: '0.62rem', color: '#888', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '0.15rem' }}>{label}</div>
                                <div style={{ fontWeight: 700, fontSize: '0.85rem', color: col, fontVariantNumeric: 'tabular-nums' }}>{formatTime(val)}</div>
                                <div style={{ fontSize: '0.6rem', color: '#888', marginTop: '0.2rem' }}>score {scoreRange}</div>
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

              <input type="text" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === 'Enter' && save()} placeholder="Your name" style={inputBase} onFocus={focus} onBlur={blur} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem' }}>
              <div>
                <label style={labelBase}>Gender</label>
                <select value={gender} onChange={e => setGender(e.target.value)} style={selectStyle} onFocus={focus} onBlur={blur}>
                  <option value="">Select…</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                </select>
              </div>
              <div>
                <label style={labelBase}>Age</label>
                <input type="number" value={age} onChange={e => setAge(e.target.value)} placeholder="e.g. 32" min={16} max={99} style={inputBase} onFocus={focus} onBlur={blur} />
                {ageGroup && <div style={{ fontSize: '0.72rem', color: YELLOW, marginTop: '0.35rem', fontWeight: 600 }}>Age group: {ageGroup}</div>}
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem' }}>
              <div>
                <label style={labelBase}>Weight (kg)</label>
                <input type="number" value={weight} onChange={e => setWeight(e.target.value)} placeholder="e.g. 70" min={30} max={200} style={inputBase} onFocus={focus} onBlur={blur} />
              </div>
              <div>
                <label style={labelBase}>Division</label>
                <select value={division} onChange={e => setDivision(e.target.value)} style={selectStyle} onFocus={focus} onBlur={blur}>
                  <option value="open">Open</option>
                  <option value="pro">Pro</option>
                  <option value="60+">60+</option>
                </select>
              </div>
            </div>
            <div style={{ position: 'relative' }}>
              <label style={labelBase}>Representing Country</label>
              <div onClick={() => setShowCountryDrop(v => !v)}
                style={{ ...inputBase, display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer', userSelect: 'none', borderColor: showCountryDrop ? YELLOW : '#333' }}>
                {selectedCountry
                  ? <><span style={{ fontSize: '1.1rem' }}>{selectedCountry.flag}</span><span style={{ color: '#ccc' }}>{selectedCountry.name}</span></>
                  : <span style={{ color: '#888' }}>Select country…</span>}
              </div>
              {showCountryDrop && (
                <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 100, background: '#161616', border: '1px solid #333', borderRadius: 10, marginTop: 4, overflow: 'hidden', boxShadow: '0 8px 24px rgba(0,0,0,0.6)' }}>
                  <input autoFocus type="text" placeholder="Search…" value={countrySearch} onChange={e => setCountrySearch(e.target.value)}
                    style={{ width: '100%', background: '#1a1a1a', border: 'none', borderBottom: '1px solid #222', color: '#ccc', padding: '0.6rem 0.9rem', fontSize: '16px', outline: 'none', boxSizing: 'border-box' }} />
                  <div style={{ maxHeight: 200, overflowY: 'auto' }}>
                    {country && <div onClick={() => { setCountry(''); setShowCountryDrop(false); setCountrySearch(''); }}
                      style={{ padding: '0.55rem 0.9rem', fontSize: '0.82rem', color: '#888', cursor: 'pointer' }}>— None</div>}
                    {filteredCountries.map(c => (
                      <div key={c.code} onClick={() => { setCountry(c.code); setShowCountryDrop(false); setCountrySearch(''); }}
                        style={{ display: 'flex', alignItems: 'center', gap: '0.6rem', padding: '0.55rem 0.9rem', fontSize: '0.82rem', color: c.code === country ? YELLOW : '#ccc', background: c.code === country ? '#1a1400' : 'transparent', cursor: 'pointer' }}>
                        <span style={{ fontSize: '1.1rem' }}>{c.flag}</span>{c.name}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Section: Race */}
          <div style={{ marginBottom: '0.5rem', fontSize: '0.68rem', fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: '0.1em' }}>Race</div>
          <div style={{ ...cardBase, padding: '1.25rem', marginBottom: '1.5rem' }}>
            <label style={labelBase}>Competition Date</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputBase} onFocus={focus} onBlur={blur} />
            {date && days !== null && (
              <div style={{ marginTop: '0.6rem', padding: '0.65rem 1rem', background: '#0d0d0d', border: '1px solid #1a1a1a', borderRadius: 8, display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                <span style={{ fontSize: '1.2rem' }}>{days > 0 ? '🏁' : days === 0 ? '🔥' : '✅'}</span>
                <div>
                  <div style={{ fontWeight: 700, color: days >= 0 ? YELLOW : '#aaa', fontSize: '0.88rem' }}>
                    {days > 0 ? `${days} days to race day` : days === 0 ? 'Race day is today!' : `Race was ${Math.abs(days)} days ago`}
                  </div>
                  <div style={{ fontSize: '0.72rem', color: '#888' }}>{formatDate(date)}</div>
                </div>
              </div>
            )}
          </div>

          <button
            onClick={save}
            disabled={!name.trim()}
            style={{
              background: saved ? '#16a34a' : YELLOW, color: saved ? '#fff' : '#000', border: 'none',
              padding: '0.9rem', borderRadius: 8, fontWeight: 800, fontSize: '0.95rem',
              cursor: name.trim() ? 'pointer' : 'not-allowed', opacity: name.trim() ? 1 : 0.5,
              transition: 'all 0.2s', width: '100%', letterSpacing: '0.02em',
            }}
          >
            {saved ? '✓ Saved!' : 'Save Profile'}
          </button>

        </div>
      );
    }

    // ─── Station Detail Page ──────────────────────────────────────────────────────

    function StationDetailPage({ station, sessions, profile, onAdd, onDelete, onBack }) {
      const [date,          setDate]          = useState(today());
      const [timeInput,     setTimeInput]     = useState('');
      const [distanceInput, setDistanceInput] = useState('');
      const [distUnit,      setDistUnit]      = useState('km');
      const [error,         setError]         = useState('');
      const [success,       setSuccess]       = useState(false);
      const isRunStation = station.id === 'run-1km';

      // Stopwatch
      const [swRunning,  setSwRunning]  = useState(false);
      const [swElapsed,  setSwElapsed]  = useState(0);   // ms
      const swStart = React.useRef(null);
      const swTick  = React.useRef(null);

      const swBegin = () => {
        swStart.current = Date.now() - swElapsed;
        swTick.current  = setInterval(() => setSwElapsed(Date.now() - swStart.current), 100);
        setSwRunning(true);
      };
      const swPause = () => {
        clearInterval(swTick.current);
        setSwRunning(false);
      };
      const swFinish = () => {
        clearInterval(swTick.current);
        setSwRunning(false);
        // auto-fill + immediately log
        const totalSecs = Math.round(swElapsed / 1000);
        const m = Math.floor(totalSecs / 60);
        const s = totalSecs % 60;
        const filled = `${m}.${String(s).padStart(2, '0')}`;
        setTimeInput(filled);
        setError('');
        // log immediately
        if (totalSecs > 0) {
          onAdd({ stationId: station.id, date, timeInSeconds: totalSecs });
          setSuccess(true);
          setTimeout(() => { setSuccess(false); setSwElapsed(0); setTimeInput(''); }, 2500);
        }
      };
      const swReset = () => {
        clearInterval(swTick.current);
        setSwRunning(false);
        setSwElapsed(0);
        setTimeInput('');
      };
      React.useEffect(() => () => clearInterval(swTick.current), []);

      const swSecs = Math.floor(swElapsed / 1000);
      const swMins = Math.floor(swSecs / 60);
      const swDisp = `${String(swMins).padStart(2,'0')}:${String(swSecs % 60).padStart(2,'0')}.${String(Math.floor((swElapsed % 1000) / 100))}`;


      const stationSessions = sessions.filter(s => s.stationId === station.id).sort((a, b) => new Date(a.date) - new Date(b.date));
      const displaySessions = [...stationSessions].reverse();
      const pb       = stationSessions.length > 0 ? Math.min(...stationSessions.map(s => s.timeInSeconds)) : null;
      const latest   = stationSessions.length > 0 ? stationSessions[stationSessions.length - 1].timeInSeconds : null;
      const vsPrev   = stationSessions.length >= 2 ? stationSessions[stationSessions.length - 1].timeInSeconds - stationSessions[stationSessions.length - 2].timeInSeconds : null;

      // Pace helpers (run-1km only)
      const getPaceSecsPerKm = (session) => {
        if (!session.distance) return null;
        const [d, u] = session.distance.split(' ');
        const dist = parseFloat(d);
        if (!dist || dist <= 0) return null;
        const distKm = u === 'mi' ? dist * 1.60934 : dist;
        return session.timeInSeconds / distKm;
      };
      const formatPaceSecs = (secsPerKm) => {
        const m = Math.floor(secsPerKm / 60);
        const s = Math.round(secsPerKm % 60);
        return `${m}:${String(s).padStart(2,'0')}/km`;
      };
      const paceSessions = isRunStation ? stationSessions.filter(s => getPaceSecsPerKm(s) !== null) : [];
      const pbPaceSession = paceSessions.length > 0 ? paceSessions.reduce((best, s) => getPaceSecsPerKm(s) < getPaceSecsPerKm(best) ? s : best) : null;
      const pbPaceSecs   = pbPaceSession ? getPaceSecsPerKm(pbPaceSession) : null;
      const latestPaceSecs = paceSessions.length > 0 ? getPaceSecsPerKm(paceSessions[paceSessions.length - 1]) : null;
      const prevPaceSecs   = paceSessions.length >= 2 ? getPaceSecsPerKm(paceSessions[paceSessions.length - 2]) : null;
      const vsPrevPace = latestPaceSecs !== null && prevPaceSecs !== null ? latestPaceSecs - prevPaceSecs : null;

      // ── Run totals (1km station only) ────────────────────────────────────────
      const getDistKm = (session) => {
        if (!session.distance) return null;
        const [d, u] = session.distance.split(' ');
        const dist = parseFloat(d);
        if (!dist || dist <= 0) return null;
        return u === 'mi' ? dist * 1.60934 : dist;
      };
      const runSessions = isRunStation ? stationSessions.filter(s => getDistKm(s) !== null) : [];
      const totalDistKm  = runSessions.reduce((sum, s) => sum + getDistKm(s), 0);
      const totalTimeSecs = runSessions.reduce((sum, s) => sum + s.timeInSeconds, 0);
      const avgPaceSecs  = totalDistKm > 0 ? totalTimeSecs / totalDistKm : null;
      // This week (Mon–Sun)
      const _now = new Date(); _now.setHours(0,0,0,0);
      const _monday = new Date(_now); _monday.setDate(_now.getDate() - ((_now.getDay() + 6) % 7));
      const weekSessions  = runSessions.filter(s => new Date(s.date + 'T00:00:00') >= _monday);
      const weekDistKm    = weekSessions.reduce((sum, s) => sum + getDistKm(s), 0);
      const weekTimeSecs  = weekSessions.reduce((sum, s) => sum + s.timeInSeconds, 0);
      const weekPaceSecs  = weekDistKm > 0 ? weekTimeSecs / weekDistKm : null;

      const handleSubmit = () => {
        if (!timeInput.trim()) { setError('Please enter a time.'); return; }
        let secs = parseTime(timeInput);
        if (isNaN(secs) || secs <= 0) { setError('Invalid — use mm:ss or seconds'); return; }
        if (isRunStation && !distanceInput) { setError('Please enter a distance.'); return; }
        setError('');
        const entry = { stationId: station.id, date, timeInSeconds: secs };
        if (isRunStation) entry.distance = `${distanceInput} ${distUnit}`;
        onAdd(entry);
        setTimeInput(''); setDistanceInput('');
        setSuccess(true);
        setTimeout(() => setSuccess(false), 2000);
      };

      const calcPace = (session) => {
        if (!session.distance) return null;
        const parts = session.distance.split(' ');
        const dist = parseFloat(parts[0]);
        const unit = parts[1];
        if (!dist || dist <= 0) return null;
        const distKm = unit === 'mi' ? dist * 1.60934 : dist;
        const secsPerKm = session.timeInSeconds / distKm;
        const m = Math.floor(secsPerKm / 60);
        const s = Math.round(secsPerKm % 60);
        return { pace: `${m}:${String(s).padStart(2,'0')}/km`, converted: unit === 'mi' };
      };

      const focus = e => e.target.style.borderColor = YELLOW;
      const blur  = e => e.target.style.borderColor = '#333';

      return (
        <div className="fade-in">
          {/* Back + header */}
          <button onClick={onBack} style={{ background: 'none', border: 'none', color: '#999', cursor: 'pointer', fontSize: '0.82rem', marginBottom: '1.25rem', padding: 0, display: 'flex', alignItems: 'center', gap: '0.3rem' }}>
            ← Back to Stations
          </button>
          {/* Station header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1rem' }}>
            <span style={{ fontSize: '2rem' }}>{station.icon}</span>
            <div>
              <h2 style={{ fontWeight: 900, fontSize: '1.6rem', letterSpacing: '-0.03em', lineHeight: 1.1 }}>{station.name}</h2>
              <div style={{ fontSize: '0.78rem', color: '#999', marginTop: '0.2rem' }}>{station.detail} · {station.num === '↺' ? 'Run between stations' : `Station ${station.num}`}</div>
            </div>
          </div>

          {/* Equipment weight */}
          {(() => {
            const division = (profile && profile.division) || 'open';
            const gender   = (profile && profile.gender)   || 'male';
            const weight   = EQUIPMENT_WEIGHTS[station.id]?.[division]?.[gender];
            if (!weight) return null;
            return (
              <div style={{ marginBottom: '1.25rem', display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                  <span style={{ fontSize: '0.68rem', color: '#999', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Equipment</span>
                  <span style={{ fontSize: '0.72rem', color: '#aaa', background: '#1a1a1a', border: '1px solid #2a2a2a', borderRadius: 10, padding: '0.15rem 0.55rem', fontWeight: 600 }}>{weight}</span>
                  <span style={{ fontSize: '0.65rem', color: '#888' }}>{division === '60+' ? '60+ div' : division === 'pro' ? 'Pro div' : 'Open div'} · {gender === 'male' ? 'Male' : 'Female'}</span>
                </div>
              </div>
            );
          })()}

          {/* 1km run note */}
          {station.id === 'run-1km' && (() => {
            const runCount = stationSessions.length;
            return (
              <div style={{ background: '#0d0d0d', border: '1px solid #1a1a1a', borderRadius: 8, padding: '0.7rem 1rem', marginBottom: '1rem', fontSize: '0.75rem', color: '#888', lineHeight: 1.55 }}>
                🏃 <strong style={{ color: '#888' }}>Log each 1km run separately.</strong> Total race run time is calculated as{' '}
                {runCount >= 8
                  ? <span style={{ color: '#4ade80' }}>the sum of your last 8 logged splits ({runCount} logged).</span>
                  : <span>average × 8 until you have 8 splits logged <span style={{ color: '#4ade80' }}>({runCount}/8)</span>.</span>
                }
              </div>
            );
          })()}

          {/* Log form */}
          <div style={{ ...cardBase, padding: '1.25rem', marginBottom: '1.5rem' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem', marginBottom: '0.75rem' }}>
              <div>
                <div style={{ fontSize: '0.62rem', fontWeight: 700, color: '#999', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.35rem' }}>Date</div>
                <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ ...inputBase, fontSize: '1rem' }} onFocus={focus} onBlur={blur} />
              </div>
              <div>
                <div style={{ fontSize: '0.62rem', fontWeight: 700, color: '#999', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.35rem' }}>{isRunStation ? 'Time (h:mm:ss or mm:ss)' : 'Time (mm.ss)'}</div>
                <input type="text" inputMode="decimal" value={timeInput} onChange={e => { setTimeInput(e.target.value); setError(''); }} onKeyDown={e => e.key === 'Enter' && handleSubmit()} placeholder={isRunStation ? '00:00:00' : '00.00'} style={{ ...inputBase, fontVariantNumeric: 'tabular-nums', fontSize: '1rem' }} onFocus={focus} onBlur={blur} />
              </div>
            </div>
            {isRunStation && (
              <div style={{ marginBottom: '0.75rem' }}>
                <div style={{ fontSize: '0.62rem', fontWeight: 700, color: '#999', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.35rem' }}>Distance</div>
                <div style={{ display: 'flex', gap: '0.5rem' }}>
                  <input type="number" min="0" step="0.01" placeholder="e.g. 5" value={distanceInput} onChange={e => setDistanceInput(e.target.value)} style={{ ...inputBase, flex: 1, fontSize: '1rem' }} onFocus={focus} onBlur={blur} />
                  <button onClick={() => setDistUnit(distUnit === 'km' ? 'mi' : 'km')} style={{ padding: '0.5rem 0.85rem', borderRadius: 8, border: '1px solid #333', background: '#1a1a1a', color: YELLOW, fontWeight: 700, fontSize: '0.82rem', cursor: 'pointer', minWidth: 44 }}>{distUnit}</button>
                </div>
              </div>
            )}
            {(() => { const swActive = swElapsed > 0 && !success;
              return <button onClick={handleSubmit} disabled={swActive} style={{ width: '100%', background: success ? '#16a34a' : swActive ? '#222' : YELLOW, color: success ? '#fff' : swActive ? '#555' : '#000', border: swActive ? '1px solid #333' : 'none', padding: '0.85rem', borderRadius: 8, fontWeight: 800, fontSize: '1rem', cursor: swActive ? 'not-allowed' : 'pointer', transition: 'all 0.2s' }}>
              {success ? '✓ Logged!' : swActive ? '⏱ Stopwatch running…' : '+ LOG SESSION'}
            </button>; })()}
          </div>
          {/* Stopwatch */}
          <div style={{ ...cardBase, padding: '1.5rem', marginBottom: '1.5rem', textAlign: 'center' }}>
            <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#999', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.75rem' }}>Stopwatch</div>
            <div style={{ fontWeight: 900, fontSize: '3rem', letterSpacing: '-0.03em', fontVariantNumeric: 'tabular-nums', color: success ? '#4ade80' : swRunning ? YELLOW : swElapsed > 0 ? '#aaa' : '#fff', lineHeight: 1, marginBottom: '1.25rem', fontFamily: 'monospace' }}>
              {success ? '✓ Logged!' : swDisp}
            </div>
            <div style={{ display: 'flex', justifyContent: 'center', gap: '0.75rem' }}>
              {!swRunning && swElapsed === 0 && !success && (
                <button onClick={swBegin} style={{ background: YELLOW, color: '#000', border: 'none', borderRadius: 8, padding: '0.75rem 2.5rem', fontWeight: 800, fontSize: '1rem', cursor: 'pointer' }}>▶ Start</button>
              )}
              {swRunning && (
                <>
                  <button onClick={swPause} style={{ background: '#333', color: '#fff', border: '1px solid #444', borderRadius: 8, padding: '0.75rem 1.5rem', fontWeight: 800, fontSize: '0.95rem', cursor: 'pointer' }}>⏸ Pause</button>
                  <button onClick={swFinish} style={{ background: '#4ade80', color: '#000', border: 'none', borderRadius: 8, padding: '0.75rem 1.5rem', fontWeight: 800, fontSize: '0.95rem', cursor: 'pointer' }}>⏹ Stop & Log</button>
                </>
              )}
              {!swRunning && swElapsed > 0 && !success && (
                <>
                  <button onClick={swBegin} style={{ background: YELLOW, color: '#000', border: 'none', borderRadius: 8, padding: '0.75rem 1.25rem', fontWeight: 800, fontSize: '0.9rem', cursor: 'pointer' }}>▶ Resume</button>
                  <button onClick={swFinish} style={{ background: '#4ade80', color: '#000', border: 'none', borderRadius: 8, padding: '0.75rem 1.25rem', fontWeight: 800, fontSize: '0.9rem', cursor: 'pointer' }}>⏹ Stop & Log</button>
                  <button onClick={swReset} style={{ background: '#1a1a1a', color: '#888', border: '1px solid #333', borderRadius: 8, padding: '0.75rem 1rem', fontWeight: 700, fontSize: '0.9rem', cursor: 'pointer' }}>↺</button>
                </>
              )}
            </div>
          </div>

          {error && <p style={{ color: '#f87171', fontSize: '0.78rem', marginBottom: '0.75rem' }}>{error}</p>}

          {/* Stats row */}
          {stationSessions.length > 0 && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(130px, 1fr))', gap: '0.7rem', marginBottom: '1.5rem' }}>
              {/* PB card with vs-prev inline */}
              <div style={{ ...cardBase, padding: '1.25rem' }}>
                <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#999', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.5rem' }}>{isRunStation ? 'Best Pace' : 'Personal Best'}</div>
                <div style={{ fontWeight: 900, fontSize: '1.6rem', color: YELLOW, letterSpacing: '-0.02em', lineHeight: 1.1 }}>{isRunStation ? (pbPaceSecs ? formatPaceSecs(pbPaceSecs) : '—') : formatTime(pb)}</div>
                {isRunStation ? (vsPrevPace !== null && (
                  <div style={{ fontSize: '0.72rem', color: vsPrevPace < 0 ? '#4ade80' : '#f87171', marginTop: '0.35rem', fontWeight: 600 }}>
                    {vsPrevPace < 0 ? `↑ ${formatPaceSecs(Math.abs(vsPrevPace))} faster` : vsPrevPace > 0 ? `↓ ${formatPaceSecs(Math.abs(vsPrevPace))} slower` : 'same as prev'}
                  </div>
                )) : (vsPrev !== null && (
                  <div style={{ fontSize: '0.72rem', color: vsPrev < 0 ? '#4ade80' : '#f87171', marginTop: '0.35rem', fontWeight: 600 }}>
                    {vsPrev < 0 ? `↑ ${formatTime(Math.abs(vsPrev))} faster` : vsPrev > 0 ? `↓ ${formatTime(Math.abs(vsPrev))} slower` : 'same as prev'}
                  </div>
                ))}
              </div>
              <StatCard label="Last Session" value={isRunStation ? (latestPaceSecs ? formatPaceSecs(latestPaceSecs) : '—') : formatTime(latest)} />
              <StatCard label="Total Sessions" value={stationSessions.length} />
            </div>
          )}

          {/* Run summary — weekly + total */}
          {isRunStation && runSessions.length > 0 && (
            <div style={{ ...cardBase, padding: '1.25rem', marginBottom: '1.5rem' }}>
              <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#999', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '1rem' }}>Run Summary</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.25rem' }}>
                {/* This week */}
                <div>
                  <div style={{ fontSize: '0.65rem', color: '#555', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.4rem' }}>This Week</div>
                  <div style={{ fontWeight: 900, fontSize: '1.5rem', color: '#fff', letterSpacing: '-0.02em' }}>{weekDistKm.toFixed(1)} <span style={{ fontSize: '0.85rem', color: '#555', fontWeight: 400 }}>km</span></div>
                  <div style={{ fontSize: '0.75rem', color: '#555', marginTop: '0.3rem' }}>
                    {weekSessions.length} run{weekSessions.length !== 1 ? 's' : ''}
                    {weekPaceSecs && <span style={{ color: '#666' }}> · avg <span style={{ color: '#aaa', fontWeight: 600 }}>{formatPaceSecs(weekPaceSecs)}</span></span>}
                  </div>
                </div>
                {/* All time */}
                <div>
                  <div style={{ fontSize: '0.65rem', color: '#555', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.4rem' }}>Total</div>
                  <div style={{ fontWeight: 900, fontSize: '1.5rem', color: YELLOW, letterSpacing: '-0.02em' }}>{totalDistKm.toFixed(1)} <span style={{ fontSize: '0.85rem', color: '#555', fontWeight: 400 }}>km</span></div>
                  <div style={{ fontSize: '0.75rem', color: '#555', marginTop: '0.3rem' }}>
                    {runSessions.length} run{runSessions.length !== 1 ? 's' : ''}
                    {avgPaceSecs && <span style={{ color: '#666' }}> · avg <span style={{ color: '#aaa', fontWeight: 600 }}>{formatPaceSecs(avgPaceSecs)}</span></span>}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Chart */}
          {stationSessions.length >= 2 && (
            <div style={{ marginBottom: '1.5rem' }}>
              <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#999', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.75rem' }}>Progress Over Time</div>
              <StationChart station={station} sessions={sessions} />
            </div>
          )}

          {/* ── Progress Analysis ── */}
          {stationSessions.length >= 2 && (() => {
            const vals = isRunStation
              ? stationSessions.map(s => getPaceSecsPerKm(s)).filter(v => v !== null)
              : stationSessions.map(s => s.timeInSeconds);
            if (vals.length < 2) return null;

            const fmt       = isRunStation ? formatPaceSecs : formatTime;
            const first     = vals[0];
            const last      = vals[vals.length - 1];
            const best      = Math.min(...vals);
            const bestIdx   = vals.indexOf(best);
            const totalDelta = last - first;            // negative = improved
            const totalPct  = Math.round(Math.abs(totalDelta) / first * 100);
            const improved  = totalDelta < 0;

            // Avg gain per session
            const avgDelta  = totalDelta / (vals.length - 1);

            // Consecutive improving streak from end
            let streak = 0;
            for (let i = vals.length - 1; i > 0; i--) {
              if (vals[i] < vals[i - 1]) streak++; else break;
            }

            // Recent momentum: compare last-2-session rate to overall rate
            const recentDelta = vals.length >= 3 ? vals[vals.length - 1] - vals[vals.length - 2] : totalDelta;
            let momentum, momentumColor;
            if (!improved) {
              momentum = 'needs more work'; momentumColor = '#f87171';
            } else if (recentDelta < avgDelta * 1.2) {
              momentum = 'accelerating 🚀'; momentumColor = '#4ade80';
            } else if (recentDelta < 0) {
              momentum = 'steady ✅'; momentumColor = YELLOW;
            } else {
              momentum = 'hit a plateau'; momentumColor = '#f87171';
            }

            const spanDays = Math.round(
              (new Date(stationSessions[stationSessions.length - 1].date + 'T00:00:00') -
               new Date(stationSessions[0].date + 'T00:00:00')) / 86400000
            );
            const pbDate = stationSessions[bestIdx]?.date;

            const uniqueDays = new Set(stationSessions.map(s => s.date)).size;
            const lastTwo = vals.slice(-2);
            const stillImproving = lastTwo.length === 2 && lastTwo[1] < lastTwo[0];
            const plateauing     = lastTwo.length === 2 && lastTwo[1] === lastTwo[0];
            const trendLabel  = stillImproving ? '↑ still improving' : plateauing ? '→ plateauing' : '↓ declining';
            const trendColor  = stillImproving ? '#4ade80' : plateauing ? YELLOW : '#f87171';
            return (
              <div style={{ padding: '0.6rem 0', marginBottom: '1.5rem' }}>
                <div style={{ fontSize: '0.85rem', color: '#555' }}>
                  You progressed{' '}
                  <span style={{ color: improved ? '#4ade80' : '#f87171', fontWeight: 700 }}>{improved ? '+' : ''}{totalPct}%</span>
                  {' '}over{' '}
                  <span style={{ color: '#ddd', fontWeight: 600 }}>{uniqueDays} day{uniqueDays !== 1 ? 's' : ''}</span>
                  {' '}of training.
                </div>
                <div style={{ fontSize: '0.85rem', fontWeight: 700, color: trendColor, marginTop: '0.25rem' }}>{trendLabel}</div>
              </div>
            );
          })()}

          {displaySessions.length > 0 && (
            <div>
              <div style={{ fontSize: '0.68rem', fontWeight: 700, color: '#999', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.75rem' }}>Session History</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem' }}>
                {displaySessions.map((session, i) => {
                  const prevSession = displaySessions[i + 1];
                  const sessionPace = getPaceSecsPerKm(session);
                  const prevPace    = prevSession ? getPaceSecsPerKm(prevSession) : null;
                  const delta = isRunStation
                    ? (sessionPace !== null && prevPace !== null ? sessionPace - prevPace : null)
                    : (prevSession ? session.timeInSeconds - prevSession.timeInSeconds : null);
                  const isPB = isRunStation
                    ? (sessionPace !== null && sessionPace === pbPaceSecs)
                    : session.timeInSeconds === pb;
                  const isLatest = i === 0;
                  const paceInfo = calcPace(session);
                  return (
                    <div key={session.id} style={{ background: isLatest ? '#161616' : '#0d0d0d', border: `1px solid ${isLatest ? '#2a2a2a' : '#1a1a1a'}`, borderRadius: 8, padding: '0.75rem 1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '0.5rem' }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                          <span style={{ fontSize: '0.68rem', fontWeight: 700, color: '#888', minWidth: '1.2rem' }}>#{displaySessions.length - i}</span>
                          <span style={{ fontSize: '0.78rem', color: '#999' }}>{formatDate(session.date)}</span>
                        </div>
                        <div style={{ display: 'flex', gap: '0.35rem', marginTop: '0.12rem', paddingLeft: '1.7rem' }}>
                          {isLatest && <span style={{ fontSize: '0.58rem', fontWeight: 700, color: '#000', background: YELLOW, padding: '0.1rem 0.3rem', borderRadius: 3, display: 'inline-flex', alignItems: 'center', verticalAlign: 'middle', lineHeight: 1 }}>LATEST</span>}
                          {isPB     && <span style={{ fontSize: '0.58rem', fontWeight: 700, color: YELLOW, border: `1px solid ${YELLOW}`, padding: '0.1rem 0.3rem', borderRadius: 3 }}>PB</span>}
                        </div>
                      </div>
                      {isRunStation ? (
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.65rem', flexShrink: 0 }}>
                          <div style={{ textAlign: 'right' }}>
                            <div style={{ fontWeight: 900, fontSize: '1.05rem', color: YELLOW, fontVariantNumeric: 'tabular-nums' }}>{paceInfo ? paceInfo.pace : '—'}</div>
                            <div style={{ fontSize: '0.65rem', color: '#666', marginTop: '0.1rem' }}>
                              {session.distance} · {formatTime(session.timeInSeconds)}{paceInfo && paceInfo.converted ? ' · mi→km' : ''}
                            </div>
                          </div>
                          <ImprovementBadge delta={delta} />
                          <button onClick={() => onDelete(session.id)} style={{ background: 'none', border: 'none', color: '#2a2a2a', cursor: 'pointer', fontSize: '0.9rem', padding: '0.1rem 0.15rem', borderRadius: 4, transition: 'color 0.12s' }} onMouseEnter={e => e.target.style.color = '#f87171'} onMouseLeave={e => e.target.style.color = '#2a2a2a'} title="Delete">×</button>
                        </div>
                      ) : (
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.45rem', flexShrink: 0 }}>
                          <span style={{ fontWeight: 800, fontSize: '1rem', fontVariantNumeric: 'tabular-nums' }}>{formatTime(session.timeInSeconds)}</span>
                          <ImprovementBadge delta={delta} />
                          <button onClick={() => onDelete(session.id)} style={{ background: 'none', border: 'none', color: '#2a2a2a', cursor: 'pointer', fontSize: '0.9rem', padding: '0.1rem 0.25rem', borderRadius: 4, transition: 'color 0.12s' }} onMouseEnter={e => e.target.style.color = '#f87171'} onMouseLeave={e => e.target.style.color = '#2a2a2a'} title="Delete">×</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── History / Calendar Page ─────────────────────────────────────────────────

    const LS_STRENGTH = 'hyrox_strength';

    function CalendarPage({ sessions, profile, onDelete }) {
      const today = new Date();
      const [viewYear,  setViewYear]  = useState(today.getFullYear());
      const [viewMonth, setViewMonth] = useState(today.getMonth()); // 0-indexed
      const [selectedDate, setSelectedDate] = useState(null);

      // Strength log
      const LS_CARDIO = 'hyrox_cardio';

      const [strengthLog, setStrengthLog] = React.useState(() => { try { return JSON.parse(localStorage.getItem(LS_STRENGTH) || '[]'); } catch(e) { return []; } });
      const [showStrengthForm, setShowStrengthForm] = React.useState(false);
      const [strDate, setStrDate] = React.useState(today.toISOString().slice(0,10));
      const [strType, setStrType] = React.useState('');
      const [strDuration, setStrDuration] = React.useState('');

      const [cardioLog, setCardioLog] = React.useState(() => { try { return JSON.parse(localStorage.getItem(LS_CARDIO) || '[]'); } catch(e) { return []; } });
      const [showCardioForm, setShowCardioForm] = React.useState(false);
      const [cdDate, setCdDate] = React.useState(today.toISOString().slice(0,10));
      const [cdType, setCdType] = React.useState('');
      const [cdOtherType, setCdOtherType] = React.useState('');
      const [cdDuration, setCdDuration] = React.useState('');
      const [cdDistance, setCdDistance] = React.useState('');
      const [cdUnit, setCdUnit] = React.useState('km');

      // Unified workout modal
      const [showWorkoutForm, setShowWorkoutForm] = React.useState(false);
      const [workoutCategory, setWorkoutCategory] = React.useState(''); // 'weight' | 'cardio'

      React.useEffect(() => { localStorage.setItem(LS_STRENGTH, JSON.stringify(strengthLog)); }, [strengthLog]);
      React.useEffect(() => { localStorage.setItem(LS_CARDIO,   JSON.stringify(cardioLog));   }, [cardioLog]);

      const addStrength = () => {
        if (!strType || !strDuration) return;
        setStrengthLog(prev => [...prev, { id: Date.now(), date: strDate, type: strType, duration: strDuration }]);
        setShowStrengthForm(false);
        setStrType(''); setStrDuration('');
      };
      const deleteStrength = (id) => setStrengthLog(prev => prev.filter(s => s.id !== id));

      const addCardio = () => {
        if (!cdType || !cdDuration) return;
        const finalType = cdType === 'Other' ? (cdOtherType.trim() || 'Other') : cdType;
        setCardioLog(prev => [...prev, { id: Date.now(), date: cdDate, type: finalType, duration: cdDuration }]);
        setShowCardioForm(false);
        setCdType(''); setCdOtherType(''); setCdDuration('');
      };
      const deleteCardio = (id) => setCardioLog(prev => prev.filter(s => s.id !== id));

      const strengthMap = useMemo(() => {
        const map = {};
        strengthLog.forEach(s => { if (!map[s.date]) map[s.date] = []; map[s.date].push(s); });
        return map;
      }, [strengthLog]);

      const cardioMap = useMemo(() => {
        const map = {};
        cardioLog.forEach(s => { if (!map[s.date]) map[s.date] = []; map[s.date].push(s); });
        return map;
      }, [cardioLog]);

      const gender   = profile.gender || 'male';
      const ageGroup = getAgeGroup(profile.age);

      // Map of "YYYY-MM-DD" → sessions[]
      const sessionMap = useMemo(() => {
        const map = {};
        sessions.forEach(s => {
          if (!map[s.date]) map[s.date] = [];
          map[s.date].push(s);
        });
        return map;
      }, [sessions]);

      // Build calendar grid for current month
      const firstDay = new Date(viewYear, viewMonth, 1);
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      // Start week on Monday (0=Mon…6=Sun)
      const startDow = (firstDay.getDay() + 6) % 7;
      const cells = [];
      for (let i = 0; i < startDow; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);

      const pad = n => String(n).padStart(2, '0');
      const dateKey = (d) => `${viewYear}-${pad(viewMonth + 1)}-${pad(d)}`;
      const todayKey = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

      const monthLabel = firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      const daysTrainedThisMonth = Object.keys(sessionMap).filter(k => k.startsWith(`${viewYear}-${pad(viewMonth + 1)}`)).length;
      const allActiveDates = new Set([...Object.keys(sessionMap), ...Object.keys(strengthMap), ...Object.keys(cardioMap)]);
      const totalDaysTrained = allActiveDates.size;
      const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

      const prevMonth = () => { if (viewMonth === 0) { setViewMonth(11); setViewYear(y => y-1); } else setViewMonth(m => m-1); setSelectedDate(null); };
      const nextMonth = () => { if (viewMonth === 11) { setViewMonth(0); setViewYear(y => y+1); } else setViewMonth(m => m+1); setSelectedDate(null); };

      const selectedSessions = selectedDate ? (sessionMap[selectedDate] || []) : [];
      const fmtDateLong = (key) => new Date(key + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

      // Daily view state
      const [viewMode, setViewMode] = React.useState('day'); // 'day' | 'calendar'
      const [dayDateStr, setDayDateStr] = React.useState(todayKey);

      const prevDay = () => {
        const d = new Date(dayDateStr + 'T00:00:00');
        d.setDate(d.getDate() - 1);
        setDayDateStr(d.toISOString().slice(0, 10));
      };
      const nextDay = () => {
        const d = new Date(dayDateStr + 'T00:00:00');
        d.setDate(d.getDate() + 1);
        const next = d.toISOString().slice(0, 10);
        if (next <= todayKey) setDayDateStr(next);
      };

      const restQuotes = [
        "Rest is where champions are built.",
        "Your muscles grow when you rest, not when you train.",
        "Recovery is part of the plan.",
        "Even the best athletes take rest days.",
        "Tomorrow's performance starts with today's recovery.",
      ];
      const activeQuotes = [
        "That's what champions are made of.",
        "One more day closer.",
        "You showed up. That's everything.",
        "The work is done. Be proud.",
        "Consistency beats perfection every time.",
      ];

      const dayLoggedWeights = (strengthMap[dayDateStr] || []).length > 0;
      const dayLoggedCardio  = (cardioMap[dayDateStr]   || []).length > 0;
      const dayLoggedHyrox   = (sessionMap[dayDateStr]  || []).length > 0;
      const dayDidAnything   = dayLoggedWeights || dayLoggedCardio || dayLoggedHyrox;
      const dayQuotePool = dayDidAnything ? activeQuotes : restQuotes;
      const dayQuote = dayQuotePool[new Date(dayDateStr + 'T00:00:00').getDate() % dayQuotePool.length];
      const dayLabel = new Date(dayDateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const isToday = dayDateStr === todayKey;

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
          {/* Heading */}
          <div style={{ fontWeight: 900, fontSize: '1.55rem', letterSpacing: '-0.03em', color: '#fff' }}>
            Day <span style={{ color: '#FFE600', margin: '0 0.3rem' }}>{totalDaysTrained}</span> Road to Hyrox
          </div>

          {viewMode === 'day' ? (<>
            {/* Day navigator card */}
            <div style={{ ...cardBase, padding: '1rem 1.25rem' }}>
              {/* Nav row */}
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.2rem' }}>
                <button onClick={prevDay} style={{ background: 'none', border: 'none', color: '#888', fontSize: '1.3rem', cursor: 'pointer', padding: '0 0.3rem', lineHeight: 1 }}>‹</button>
                <div style={{ fontSize: '1rem', color: '#fff', fontWeight: 700 }}>{isToday ? `Today · ${dayLabel}` : dayLabel}</div>
                <button onClick={nextDay} disabled={isToday} style={{ background: 'none', border: 'none', color: isToday ? '#333' : '#666', fontSize: '1.3rem', cursor: isToday ? 'default' : 'pointer', padding: '0 0.3rem', lineHeight: 1 }}>›</button>
              </div>
              {/* Quote */}
              <div style={{ fontSize: '0.72rem', color: dayDidAnything ? '#4ade80' : '#444', marginBottom: '0.75rem', fontStyle: 'italic', textAlign: 'center' }}>{dayQuote}</div>
              {/* Log button */}
              <button onClick={() => { setStrDate(dayDateStr); setStrType(''); setStrDuration(''); setCdType(''); setCdDuration(''); setWorkoutCategory(''); setShowWorkoutForm(true); }}
                style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.4rem', padding: '0.7rem', background: '#1a1a1a', border: `1px solid ${(dayLoggedWeights || dayLoggedCardio) ? '#1a4a1a' : '#2a2a2a'}`, borderRadius: 10, cursor: 'pointer', width: '100%' }}>
                <span style={{ fontSize: '0.78rem', fontWeight: 700, color: '#ccc' }}>+ Workout</span>
                {(dayLoggedWeights || dayLoggedCardio) && <span style={{ fontSize: '0.65rem', color: '#4ade80' }}>✓</span>}
              </button>
            </div>

            {/* Sessions for this day */}
            {(() => {
              const daySessions = sessionMap[dayDateStr] || [];
              const dayStrength = strengthMap[dayDateStr] || [];
              const dayCardio   = cardioMap[dayDateStr]   || [];
              const hasAnything = daySessions.length > 0 || dayStrength.length > 0 || dayCardio.length > 0;
              if (!hasAnything) return (
                <div style={{ fontSize: '0.75rem', color: '#888', textAlign: 'center', padding: '0.5rem 0' }}>No activity logged this day.</div>
              );
              return (
                <div style={{ ...cardBase, overflow: 'hidden' }} className="fade-in">
                  {daySessions.map((s) => {
                    const st = STATIONS.find(x => x.id === s.stationId);
                    const bm = getBenchmark(s.stationId, gender, ageGroup);
                    const tier = getTier(s.timeInSeconds, bm);
                    const tc = tier ? TIER_CONFIG[tier] : null;
                    return (
                      <div key={s.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.65rem 1.1rem', borderBottom: '1px solid #151515' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                          <span style={{ fontSize: '1rem' }}>{st?.icon || '🏋️'}</span>
                          <div>
                            <div style={{ fontWeight: 700, fontSize: '0.82rem' }}>{st?.name || s.stationId}</div>
                            {st?.detail && <div style={{ fontSize: '0.65rem', color: '#888' }}>{st.detail}</div>}
                          </div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                          {tc && <span style={{ fontSize: '0.65rem', fontWeight: 700, color: tc.color, background: tc.bg, border: `1px solid ${tc.border}`, padding: '0.15rem 0.45rem', borderRadius: 12 }}>{tc.icon} {tc.label}</span>}
                          <span style={{ fontWeight: 800, fontSize: '1rem', color: YELLOW, fontVariantNumeric: 'tabular-nums' }}>{formatTime(s.timeInSeconds)}</span>
                          <button onClick={() => onDelete(s.id)} style={{ background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontSize: '0.9rem', padding: '0.2rem', lineHeight: 1 }}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                  {dayStrength.map((s) => (
                    <div key={s.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.65rem 1.1rem', borderBottom: '1px solid #151515' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                        <span style={{ fontSize: '1rem' }}>🏋️</span>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: '0.82rem' }}>{s.type}</div>
                          <div style={{ fontSize: '0.65rem', color: '#888' }}>Weight Training{s.duration ? ` · ${s.duration}` : ''}</div>
                        </div>
                      </div>
                      <button onClick={() => deleteStrength(s.id)} style={{ background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontSize: '0.9rem', padding: '0.2rem', lineHeight: 1 }}>✕</button>
                    </div>
                  ))}
                  {dayCardio.map((s) => (
                    <div key={s.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.65rem 1.1rem', borderBottom: '1px solid #151515' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                        <span style={{ fontSize: '1rem' }}>🏃</span>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: '0.82rem' }}>{s.type}</div>
                          <div style={{ fontSize: '0.65rem', color: '#888' }}>Cardio{s.duration ? ` · ${s.duration}` : ''}</div>
                        </div>
                      </div>
                      <button onClick={() => deleteCardio(s.id)} style={{ background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontSize: '0.9rem', padding: '0.2rem', lineHeight: 1 }}>✕</button>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* Calendar toggle */}
            <button onClick={() => setViewMode('calendar')} style={{ background: 'none', border: '1px solid #2a2a2a', borderRadius: 8, color: '#888', fontSize: '0.78rem', fontWeight: 700, padding: '0.55rem', cursor: 'pointer', letterSpacing: '0.03em' }}>
              📅 View Calendar
            </button>

          </>) : (<>
            {/* Back to day view */}
            <button onClick={() => { setViewMode('day'); setDayDateStr(todayKey); }} style={{ background: 'none', border: 'none', color: '#888', fontSize: '0.78rem', fontWeight: 700, cursor: 'pointer', padding: '0', textAlign: 'left', letterSpacing: '0.03em' }}>
              ← Back to Today
            </button>

          {/* Month nav */}
          <div style={{ ...cardBase, padding: '1.1rem 1.25rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem' }}>
              <button onClick={prevMonth} style={{ background: 'none', border: 'none', color: '#888', fontSize: '1.1rem', cursor: 'pointer', padding: '0.2rem 0.5rem' }}>‹</button>
              <span style={{ fontWeight: 800, fontSize: '0.95rem' }}>{monthLabel}</span>
              <button onClick={nextMonth} style={{ background: 'none', border: 'none', color: '#888', fontSize: '1.1rem', cursor: 'pointer', padding: '0.2rem 0.5rem' }}>›</button>
            </div>

            {/* Day-of-week headers */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '2px', marginBottom: '4px' }}>
              {DOW.map(d => (
                <div key={d} style={{ textAlign: 'center', fontSize: '0.6rem', fontWeight: 700, color: '#888', padding: '0.2rem 0', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{d}</div>
              ))}
            </div>

            {/* Day cells */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '3px' }}>
              {cells.map((day, i) => {
                if (!day) return <div key={`e${i}`} />;
                const key = dateKey(day);
                const hasHyrox   = !!sessionMap[key];
                const hasRegular = !!(strengthMap[key] || cardioMap[key]);
                const hasAnyday  = hasHyrox || hasRegular;
                const isToday = key === todayKey;
                const isSelected = key === selectedDate;
                const bgColor    = isSelected ? YELLOW : hasHyrox ? '#1a1400' : hasRegular ? '#1a1a1a' : 'transparent';
                const borderColor = isSelected ? YELLOW : isToday ? '#555' : hasHyrox ? '#3a2e00' : hasRegular ? '#333' : 'transparent';
                const textColor   = isSelected ? '#000' : hasHyrox ? YELLOW : hasRegular ? '#fff' : isToday ? '#fff' : '#444';
                const dotColor    = hasHyrox ? YELLOW : '#666';
                return (
